<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>制作裁决书 - 劳动仲裁信息查询综合服务平台</title>
    <script src="{{ url_for('static', filename='js/tailwindcss.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fontawesome.all.min.css') }}">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .document-font {
            font-family: 'Noto Serif SC', 'SimSun', serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .field-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
        }
        .field-card:hover {
            transform: translateX(4px);
            border-left-color: #e5e7eb;
        }
        .field-card.active {
            border-left-color: #3B82F6;
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
        }
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
            resize: vertical;
        }
        .input-field:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }
 
        .document-preview {
            background: #fff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }
        
        .section-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Header -->
    <header class="glass-panel sticky top-0 z-40 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold text-2xl shadow-lg cursor-pointer" onclick="window.location.href='/handle_query'">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">仲裁裁决书制作系统</h1>
                        <p class="text-sm text-gray-600 flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <span id="caseNoDisplay" class="text-purple-600 font-medium"></span>
                        </p>
                    </div>
                </div>
                
                <div class="flex items-center space-x-3">
                    <button onclick="saveElements()" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition-all flex items-center shadow-lg">
                        <i class="fas fa-save mr-2"></i>
                        保存
                    </button>
                    <button onclick="generateWord()" class="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:from-purple-700 hover:to-blue-700 transition-all flex items-center shadow-lg">
                        <i class="fas fa-file-word mr-2"></i>
                        生成Word
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <div id="loadingState" class="bg-white rounded-xl shadow-lg p-12 text-center">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-gray-600">正在加载案件数据...</p>
        </div>

        <!-- 错误状态 -->
        <div id="errorState" class="hidden bg-white rounded-xl shadow-lg p-12 text-center">
            <i class="fas fa-exclamation-circle text-red-400 text-5xl mb-4"></i>
            <p class="text-red-500 text-lg" id="errorMessage">加载失败</p>
            <button onclick="loadData()" class="mt-4 bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">
                <i class="fas fa-refresh mr-2"></i>重新加载
            </button>
        </div>

        <!-- 内容区域 -->
        <div id="contentArea" class="hidden fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <!-- Left: Editing Form -->
                <div class="space-y-4">
                    <!-- Case Info -->
                    <div class="glass-panel rounded-xl p-5 bg-white shadow-sm">

                            <i class="fas fa-folder-open mr-2"></i>案件基本信息
                        </h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">案号</label>
                                <input type="text" id="caseNo" readonly

                    <!-- Fields -->

                        <!-- 非终局裁决 -->

                            <div class="flex justify-between items-start mb-3">

                            <i class="fas fa-trash-alt mr-2"></i>清空内容

                    </div>
                </div>

                <!-- Right: Preview -->
                <div class="lg:sticky lg:top-24 h-fit">
                    <div class="glass-panel rounded-xl p-6 bg-white shadow-lg">
                        <!-- 标签切换 -->
                        <div class="flex justify-between items-center mb-4 border-b pb-3">
                            <div class="flex gap-1 bg-gray-100 p-1 rounded-lg">
                                <button id="tabPreview" onclick="switchTab('preview')" class="px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-blue-600 shadow-sm">
                                    <i class="fas fa-eye mr-1"></i>实时预览
                                </button>
                                <button id="tabAI" onclick="switchTab('ai')" class="px-4 py-2 rounded-md text-sm font-medium transition-all text-gray-600 hover:text-gray-900">

                            </div>
                            <div class="flex gap-2" id="zoomControls">

                                <span id="zoomLevel" class="text-xs text-gray-500 flex items-center">100%</span>
                                <button onclick="zoomPreview(1.1)" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-600 transition-colors" title="放大">

                                </button>
                            </div>

                                <h2 class="text-3xl font-bold mb-3 text-black tracking-widest">仲裁裁决书</h2>
                                <p id="previewCaseNo" class="text-gray-700 font-medium text-lg"></p>
                            </div>

                            <div class="space-y-6 text-justify">
                                <div id="previewSection1" class="hidden opacity-0 transition-opacity duration-500">

                                        <span class="w-6 h-6 rounded-full bg-gray-800 text-white flex items-center justify-center text-xs mr-2">一</span>
                                        仲裁请求
                                    </h4>
                                    <p class="text-gray-800 leading-8 text-justify pl-0"></p>
                                </div>
                                
                                <div id="previewSection2" class="hidden opacity-0 transition-opacity duration-500">
                                    <h4 class="font-bold mb-3 text-gray-900 text-base flex items-center">
                                        <span class="w-6 h-6 rounded-full bg-gray-800 text-white flex items-center justify-center text-xs mr-2">二</span>
                                        申请人称
                                    </h4>
                                    <p class="text-gray-800 leading-8 text-justify"></p>
                                </div>
                                
                                <div id="previewSection3" class="hidden opacity-0 transition-opacity duration-500">
                                    <h4 class="font-bold mb-3 text-gray-900 text-base flex items-center">

                                    <p class="text-gray-800 leading-8 text-justify"></p>
                                </div>
                                
                                <div id="previewSection4" class="hidden opacity-0 transition-opacity duration-500">
                                    <h4 class="font-bold mb-3 text-gray-900 text-base flex items-center">

                            </div>

                            <div class="mt-16 pt-8 border-t border-gray-300 text-center text-gray-700 text-sm hidden" id="footerInfo">

                                        <p>仲裁员：_______________</p>
                                    </div>
                                    <div class="text-right">
                                        <p id="previewDate">日期：_______年____月____日</p>
                                    </div>
                                </div>
                                <div class="mt-8 text-xs text-gray-500">
                                    <p>本裁决为终局裁决</p>

                        </div>
                        
                        <!-- 撰写裁决书初稿助手内容 -->
                        <div id="aiContainer" class="hidden rounded-lg overflow-hidden bg-white" style="height: 700px; position: relative;">
                            <div id="aiLoading" class="absolute inset-0 flex items-center justify-center bg-white z-10">
                                <div class="text-center">
                                    <div class="loading-spinner mx-auto mb-4"></div>
                                    <p class="text-gray-600">正在加载 AI 助手...</p>
                                </div>

                            <iframe 
                                id="aiFrame"
                                src="{{ dify_url }}/chatbot/FomjPIsNUFZzcoGn" 
                                style="width: 100%; height: 100%; border: none;" 
                                frameborder="0" 
                                allow="microphone"
                                onload="document.getElementById('aiLoading').style.display='none'">
                            </iframe>

                    </div>
                </div>
            </div>

    </main>

    <script>
        let currentZoom = 1;
        let selectedField = null;
        let currentCaseId = null;
        let currentCaseNo = '';
        let caseData = null;

        // 字段映射
        const FIELD_MAP = {
            'arbitrationRequest': '仲裁请求',
            'applicantClaim': '申请人称',
            'respondentClaim': '被申请人称',
            'factsFound': '经审理查明',
            'committeeOpinion': '本委认为',
            'finalDecision': '终局裁决',
            'nonFinalDecision': '非终局裁决'
        };

        // 初始化
        window.onload = function() {
            // 从URL获取案件ID
            const urlParams = new URLSearchParams(window.location.search);
            currentCaseId = urlParams.get('case_id');
            
            if (!currentCaseId) {
                showError('缺少案件ID参数');
                return;
            }
            
            loadData().then(() => {
                // 页面加载完成后检查是否已有生成的文件
                checkExistingFiles();
            });
        };

        // 加载数据
        async function loadData() {
            showLoading();
            
            try {
                // 1. 获取案件详情
                const caseResponse = await fetch(`/api/handle/detail?id=${currentCaseId}`);
                const caseResult = await caseResponse.json();
                
                if (caseResult.code === 200 && caseResult.data) {
                    caseData = caseResult.data.data || caseResult.data;
                    if (caseData.data) caseData = caseData.data;
                    
                    // 缓存案件数据供后续使用
                    cachedCaseData = caseData;
                    
                    currentCaseNo = caseData.case_no || '';
                    document.getElementById('caseNoDisplay').textContent = currentCaseNo;
                    document.getElementById('caseNo').value = currentCaseNo;
                    document.title = `制作裁决书 - ${currentCaseNo}`;
                    
                    // 检查庭审笔录
                    checkCourtRecord(caseData);
                }
                
                // 2. 获取已保存的裁决书要素
                console.log('正在查询裁决书要素，case_id:', currentCaseId);
                const elementsResponse = await fetch(`/api/award/elements/${currentCaseId}`);
                const elementsResult = await elementsResponse.json();

                if (/^\d{8}$/.test(compactDate)) {

                    const month = parseInt(compactDate.substring(4, 6));
                    const day = parseInt(compactDate.substring(6, 8));
                    document.getElementById('acceptTime').value = `${year}年${month}月${day}日`;
                } else {

        // 阿拉伯数字转中文数字
        function numToChinese(num) {
            const chineseNums = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
            if (num <= 10) {
                return chineseNums[num];
            } else if (num < 20) {
                return '十' + (num % 10 === 0 ? '' : chineseNums[num % 10]);
            } else if (num < 100) {
                return chineseNums[Math.floor(num / 10)] + '十' + (num % 10 === 0 ? '' : chineseNums[num % 10]);
            }
            return num.toString();
        }

            if (requests.length > 0) {

            }
            
            // 预填充受理时间

            if (handleAt) {
                const date = new Date(handleAt);

                    const month = date.getMonth() + 1;
                    const day = date.getDate();
                    document.getElementById('acceptTime').value = `${year}年${month}月${day}日`;
                }
            }

            document.querySelectorAll('textarea').forEach(ta => checkFieldStatus(ta));

        // 生成Word（调用Dify Workflow）
        let pollingInterval = null;
        
        async function generateWord() {
            const data = {
                case_id: currentCaseId,
                case_no: currentCaseNo,
                仲裁请求: document.getElementById('arbitrationRequest').value,
                申请人称: document.getElementById('applicantClaim').value,
                被申请人称: document.getElementById('respondentClaim').value,
                经审理查明: document.getElementById('factsFound').value,
                本委认为: document.getElementById('committeeOpinion').value,
                终局裁决: document.getElementById('finalDecision').value,
                非终局裁决: document.getElementById('nonFinalDecision').value,
                受理时间: document.getElementById('acceptTime').value
            };
            
            // 检查是否有内容
            const hasContent = Object.values(data).some(v => v && typeof v === 'string' && v.trim());
            if (!hasContent) {
                showToast('请先填写裁决书内容');
                return;
            }
            
            showGeneratingStatus('生成任务已提交，预计需要5-10分钟...');
            
            try {
                const response = await fetch('/api/award/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (!response.ok || result.code !== 200) {
                    throw new Error(result.message || '生成任务提交失败');
                }
                
                showToast('生成任务已提交，开始轮询查询...');
                
                // 开始轮询查询生成状态
                startPollingStatus();
                
            } catch (error) {
                console.error('生成失败:', error);
                showToast('生成失败: ' + error.message);
                hideGeneratingStatus();
            }
        }

        function showGeneratingStatus(message) {
            let statusDiv = document.getElementById('generatingStatus');
            if (!statusDiv) {
                statusDiv = document.createElement('div');
                statusDiv.id = 'generatingStatus';
                statusDiv.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-lg shadow-lg z-50 flex items-center gap-3';
                document.body.appendChild(statusDiv);

        // 隐藏生成中状态
        function hideGeneratingStatus() {
            const statusDiv = document.getElementById('generatingStatus');
            if (statusDiv) {
                statusDiv.classList.add('hidden');
            }
        }
        
        // 开始轮询查询状态
        function startPollingStatus() {
            // 清除之前的轮询
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }
            
            // 立即查询一次
            checkGenerationStatus();
            
            // 每10秒查询一次，最多查询60次（10分钟）
            let pollCount = 0;
            const maxPolls = 60;
            
            pollingInterval = setInterval(async () => {
                pollCount++;
                if (pollCount >= maxPolls) {
                    clearInterval(pollingInterval);
                    showToast('生成时间较长，请稍后手动刷新查看');
                    hideGeneratingStatus();
                    return;
                }
                
                await checkGenerationStatus();
            }, 10000);
        }
        
        // 检查生成状态
        async function checkGenerationStatus() {
            try {
                const response = await fetch(`/api/award/status/${currentCaseId}`);
                const result = await response.json();
                
                if (result.code === 200 && result.data) {
                    const status = result.data.status;
                    
                    if (status === 'completed') {
                        // 生成完成
                        clearInterval(pollingInterval);
                        hideGeneratingStatus();
                        showGeneratedFiles(result.data.file_paths);
                        showToast('裁决书生成完成！');
                    } else {
                        // 仍在生成中
                        showGeneratingStatus(`裁决书生成中，请耐心等待... (${result.data.bianhao || ''})`);
                    }
                }
            } catch (error) {
                console.error('查询状态失败:', error);
            }
        }

        // 更新预览
        function updatePreview() {
            const fields = {
                'arbitrationRequest': 'previewSection1',
                'applicantClaim': 'previewSection2',
                'respondentClaim': 'previewSection3',
                'factsFound': 'previewSection4',
                'committeeOpinion': 'previewSection5',

                'nonFinalDecision': 'previewSection7'
            };

            // 案号
            const caseNo = document.getElementById('caseNo').value;
            document.getElementById('previewCaseNo').textContent = caseNo;

            // 更新各段落
            for (const [inputId, sectionId] of Object.entries(fields)) {
                const content = document.getElementById(inputId).value;
                const section = document.getElementById(sectionId);
                const paragraph = section.querySelector('p');
                
                if (content && content.trim()) {
                    // 将每行内容单独包裹在div中，确保对齐
                    const lines = content.split('\n');
                    paragraph.innerHTML = lines.map(line => 
                        `<div class="mb-1">${line}</div>`
                    ).join('');
                    section.classList.remove('hidden');
                    setTimeout(() => {
                        section.classList.remove('opacity-0');
                    }, 10);
                } else {
                    section.classList.add('opacity-0');
                    setTimeout(() => {
                        section.classList.add('hidden');
                    }, 500);
                }
            }

            // 页脚
            const hasContent = Object.keys(fields).some(id => 
                document.getElementById(id).value.trim()
            );
            document.getElementById('footerInfo').classList.toggle('hidden', !hasContent);
        }

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-20px)';
                toast.style.transition = 'all 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 案件数据缓存（用于获取笔录内容）
        let cachedCaseData = null;
        
        // 从接口数据获取仲裁请求并填充（回档默认内容）
        function resetArbitrationRequest(event) {
            if (event) {
                event.stopPropagation();
            }
            
            if (!cachedCaseData) {
                showToast('暂无案件数据，请稍后重试');
                return;
            }
            
            const requests = cachedCaseData.case_arb_request || cachedCaseData.requests || [];
            if (requests.length === 0) {
                showToast('接口数据中没有找到仲裁请求');
                return;
            }
            
            // 格式化仲裁请求
            const requestText = requests.map((req, idx) => 
                `${numToChinese(idx + 1)}、${req.intro || req.content || req.request_content || ''}`
            ).join('\n');
            
            // 填充到文本框
            const textarea = document.getElementById('arbitrationRequest');
            textarea.value = requestText;
            
            // 触发更新
            updatePreview();
            checkFieldStatus(textarea);
            
            showToast('已从接口数据回档仲裁请求');
        }

        // 获取仲裁请求内容（优先级：数据库 > 页面已有内容 > 接口数据）
        async function getArbitrationRequest() {
            // 1. 优先从数据库获取
            try {
                const response = await fetch(`/api/award/elements/${currentCaseId}`);
                const result = await response.json();
                if (result.code === 200 && result.data && result.data.仲裁请求) {
                    console.log('使用数据库中的仲裁请求');
                    return result.data.仲裁请求;
                }
            } catch (e) {
                console.log('数据库查询失败:', e);
            }
            
            // 2. 其次从页面已输入的内容获取
            const pageValue = document.getElementById('arbitrationRequest').value;
            if (pageValue && pageValue.trim()) {
                console.log('使用页面已有的仲裁请求');
                return pageValue;
            }
            
            // 3. 最后从案件接口数据预填充
            if (cachedCaseData) {
                const requests = cachedCaseData.case_arb_request || cachedCaseData.requests || [];
                if (requests.length > 0) {
                    console.log('使用接口返回的仲裁请求数据');
                    return requests.map((req, idx) => 
                        `${numToChinese(idx + 1)}、${req.intro || req.content || req.request_content || ''}`
                    ).join('\n');
                }
            }
            
            return '';
        }

        // 自动生成申请人称/被申请人称
        // 类型: 'applicantClaim' 或 'respondentClaim'
        async function autoGenerateClaim(fieldType, event) {
            // 阻止冒泡，避免触发父元素的点击事件
            if (event) {
                event.stopPropagation();
            }
            
            const isApplicant = fieldType === 'applicantClaim';
            const fieldName = isApplicant ? '申请人称' : '被申请人称';
            
            // 检查是否有笔录数据
            const textPart3 = getCourtRecordPart3();
            if (!textPart3) {
                showToast('未找到庭审笔录，无法自动生成');
                return;
            }
            
            // 获取仲裁请求内容（优先级：数据库 > 页面已有内容 > 接口数据）
            const defaultRequest = await getArbitrationRequest();
            
            // 显示输入对话框（只显示限制字数，仲裁请求不显示）
            const userInputs = await showGenerateDialog(fieldName, defaultRequest, true);
            if (!userInputs) {
                return; // 用户取消
            }
            
            const { count, request } = userInputs;
            
            const textarea = document.getElementById(fieldType);
            const btnId = isApplicant ? 'btnAutoApplicant' : 'btnAutoRespondent';
            const btn = document.getElementById(btnId);
            
            // 检查是否正在生成中
            if (btn.disabled) {
                return;
            }
            
            // 设置按钮为加载状态
            const originalBtnContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<div class="animate-spin w-3 h-3 border-2 border-white border-t-transparent rounded-full mr-1.5"></div>生成中...`;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            
            showToast(`正在生成${fieldName}，预计需要1分钟...`);
            
            console.log('[AutoGenerate] 开始调用:', { fieldType, fieldName, count: userInputs.count });
            
            try {
                const result = await callAutoGenerateWorkflow(fieldType, count, request, textPart3);
                
                if (result.success && result.content) {
                    // 填入结果
                    textarea.value = result.content;
                    // 触发输入事件以更新预览
                    updatePreview();
                    checkFieldStatus(textarea);
                    showToast(`${fieldName}生成成功！`);
                } else {
                    throw new Error(result.message || '生成失败');
                }
            } catch (error) {
                console.error('自动生成失败:', error);
                showToast(`${fieldName}生成失败: ${error.message}`);
            } finally {
                // 恢复按钮状态
                btn.disabled = false;
                btn.innerHTML = originalBtnContent;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }
        
        // 获取庭审笔录的part3内容
        function getCourtRecordPart3() {
            console.log('[AutoGenerate] cachedCaseData:', cachedCaseData ? '有数据' : '无数据');
            
            if (!cachedCaseData) return null;
            
            const writingJson = cachedCaseData.writing_json || cachedCaseData.writingJson || [];
            console.log('[AutoGenerate] writingJson长度:', writingJson.length);
            
            if (!Array.isArray(writingJson) || writingJson.length === 0) {
                return null;
            }
            
            // 查找开庭笔录或庭审笔录
            const courtRecord = writingJson.find(item => {
                const title = item.title || '';
                return title.includes('开庭笔录') || title.includes('庭审笔录');
            });
            
            console.log('[AutoGenerate] 找到笔录:', courtRecord ? courtRecord.title : '未找到');
            
            if (!courtRecord) {
                return null;
            }
            
            // 从 json 字段中提取 part3
            const jsonStr = courtRecord.json || '{}';
            console.log('[AutoGenerate] 笔录json字段长度:', jsonStr.length);
            
            try {
                const recordJson = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
                const part3 = recordJson.part3 || '';
                console.log('[AutoGenerate] part3长度:', part3.length);
                return part3;
            } catch (e) {
                console.error('解析笔录json失败:', e);
                return null;
            }
        }
        
        // 显示生成参数输入对话框
        // hideRequest: 是否隐藏仲裁请求输入框（默认false）
        function showGenerateDialog(fieldName, defaultRequest, hideRequest = false) {
            return new Promise((resolve) => {
                // 创建对话框元素
                const overlay = document.createElement('div');
                overlay.id = 'generateDialogOverlay';
                overlay.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm z-[200] flex items-center justify-center';
                overlay.style.animation = 'fadeIn 0.2s ease-out';
                
                const dialog = document.createElement('div');
                dialog.className = 'bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden transform scale-100';
                dialog.style.animation = 'fadeIn 0.3s ease-out';
                
                // 根据hideRequest决定是否显示仲裁请求输入框
                const requestHtml = hideRequest ? '' : `
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">
                            仲裁请求 <span class="text-gray-400 text-xs">(参考生成${fieldName})</span>
                        </label>
                        <textarea id="dialogRequest" rows="4" 
                                  class="input-field w-full rounded-lg px-4 py-3 text-sm border-2 border-gray-200 focus:border-green-500 focus:outline-none resize-none" 
                                  placeholder="请输入仲裁请求内容...">${escapeHtml(defaultRequest)}</textarea>
                    </div>
                `;
                
                dialog.innerHTML = `
                    <div class="bg-gradient-to-r from-green-500 to-emerald-500 px-6 py-4">
                        <h3 class="text-white font-bold text-lg flex items-center">
                            <i class="fas fa-magic mr-2"></i>自动生成${fieldName}
                        </h3>
                    </div>
                    <div class="p-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">
                                限制字数 <span class="text-gray-400 text-xs">(生成内容的最大字数)</span>
                            </label>
                            <input type="number" id="dialogNumb" 
                                   class="input-field w-full rounded-lg px-4 py-2.5 text-sm border-2 border-gray-200 focus:border-green-500 focus:outline-none" 
                                   placeholder="请输入限制字数，如 500"
                                   min="100" max="5000" value="600">
                        </div>
                        ${requestHtml}
                    </div>
                    <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3">
                        <button id="dialogCancel" 
                                class="px-4 py-2 text-gray-600 hover:text-gray-800 hover:bg-gray-200 rounded-lg transition-colors text-sm font-medium">
                            取消
                        </button>
                        <button id="dialogConfirm" 
                                class="px-5 py-2 bg-gradient-to-r from-green-500 to-emerald-500 text-white rounded-lg hover:from-green-600 hover:to-emerald-600 transition-all text-sm font-medium shadow-md flex items-center">
                            <i class="fas fa-play mr-2"></i>开始生成
                        </button>
                    </div>
                `;
                
                overlay.appendChild(dialog);
                document.body.appendChild(overlay);
                
                // 聚焦到输入框
                setTimeout(() => {
                    document.getElementById('dialogNumb').focus();
                }, 100);
                
                // 处理取消
                document.getElementById('dialogCancel').addEventListener('click', () => {
                    overlay.remove();
                    resolve(null);
                });
                
                // 处理确认
                document.getElementById('dialogConfirm').addEventListener('click', async () => {
                    const count = document.getElementById('dialogNumb').value.trim();
                    
                    let request = '';
                    if (hideRequest) {
                        // 隐藏仲裁请求输入框时，按照优先级获取：数据库 > 页面 > 接口数据
                        request = await getArbitrationRequest();
                    } else {
                        request = document.getElementById('dialogRequest').value.trim();
                    }
                    
                    if (!count || parseInt(count) <= 0) {
                        showToast('请输入有效的限制字数');
                        return;
                    }
                    if (!request) {
                        showToast('请输入仲裁请求内容');
                        return;
                    }
                    
                    overlay.remove();
                    resolve({ count: parseInt(count), request });
                });
                
                // 点击遮罩关闭
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.remove();
                        resolve(null);
                    }
                });
                
                // ESC键关闭
                const handleEsc = (e) => {
                    if (e.key === 'Escape') {
                        overlay.remove();
                        resolve(null);
                        document.removeEventListener('keydown', handleEsc);
                    }
                };
                document.addEventListener('keydown', handleEsc);
            });
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 调用自动生成工作流
        async function callAutoGenerateWorkflow(fieldType, count, request, textPart3) {
            const isApplicant = fieldType === 'applicantClaim';
            
            // 调试日志
            console.log('[AutoGenerate] 调用参数:', {
                fieldType,
                count,
                requestLength: request ? request.length : 0,
                textPart3Length: textPart3 ? textPart3.length : 0,
                textPart3Preview: textPart3 ? textPart3.substring(0, 100) + '...' : '空'
            });
            
            const response = await fetch('/api/workflow/generate-claim', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    case_id: currentCaseId,
                    case_no: currentCaseNo,
                    claim_type: fieldType, // 'applicantClaim' 或 'respondentClaim'
                    count: count,
                    request: request,
                    textPart3: textPart3,
                    is_applicant: isApplicant
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || '网络请求失败');
            }
            
            return await response.json();
        }

    </script>
</body>
