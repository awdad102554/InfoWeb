<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>制作裁决书 - 劳动仲裁信息查询综合服务平台</title>
    <script src="{{ url_for('static', filename='js/tailwindcss.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fontawesome.all.min.css') }}">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .document-font {
            font-family: 'Noto Serif SC', 'SimSun', serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .field-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
        }
        .field-card:hover {
            transform: translateX(4px);
            border-left-color: #e5e7eb;
        }
        .field-card.active {
            border-left-color: #3B82F6;
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
        }
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
            resize: vertical;
        }
        .input-field:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }
 
        .document-preview {
            background: #fff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }
        
        .section-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Header -->
    <header class="glass-panel sticky top-0 z-40 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold text-2xl shadow-lg cursor-pointer" onclick="window.location.href='/handle_query'">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">仲裁裁决书制作系统</h1>
                        <p class="text-sm text-gray-600 flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <span id="caseNoDisplay" class="text-purple-600 font-medium"></span>
                        </p>
                    </div>
                </div>
                
                <div class="flex items-center space-x-3">
                    <button onclick="saveElements()" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition-all flex items-center shadow-lg">
                        <i class="fas fa-save mr-2"></i>
                        保存
                    </button>
                    <button onclick="generateWord()" class="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:from-purple-700 hover:to-blue-700 transition-all flex items-center shadow-lg">
                        <i class="fas fa-file-word mr-2"></i>
                        生成Word
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->

        <!-- 内容区域 -->

                                <div id="previewSection3" class="hidden opacity-0 transition-opacity duration-500">

                    </div>
                </div>
            </div>

    </main>

    <script>
        let currentZoom = 1;
        let selectedField = null;
        let currentCaseId = null;
        let currentCaseNo = '';
        let caseData = null;

        // 字段映射
        const FIELD_MAP = {
            'arbitrationRequest': '仲裁请求',
            'applicantClaim': '申请人称',
            'respondentClaim': '被申请人称',
            'factsFound': '经审理查明',
            'committeeOpinion': '本委认为',
            'finalDecision': '终局裁决',
            'nonFinalDecision': '非终局裁决'
        };

        // 初始化
        window.onload = function() {
            // 从URL获取案件ID
            const urlParams = new URLSearchParams(window.location.search);
            currentCaseId = urlParams.get('case_id');
            
            if (!currentCaseId) {
                showError('缺少案件ID参数');
                return;
            }
            
            loadData();
        };

        // 加载数据
        async function loadData() {
            showLoading();
            
            try {
                // 1. 获取案件详情
                const caseResponse = await fetch(`/api/handle/detail?id=${currentCaseId}`);
                const caseResult = await caseResponse.json();
                
                if (caseResult.code === 200 && caseResult.data) {
                    caseData = caseResult.data.data || caseResult.data;
                    if (caseData.data) caseData = caseData.data;
                    
                    currentCaseNo = caseData.case_no || '';
                    document.getElementById('caseNoDisplay').textContent = currentCaseNo;
                    document.getElementById('caseNo').value = currentCaseNo;
                    document.title = `制作裁决书 - ${currentCaseNo}`;
                    
                    // 检查庭审笔录
                    checkCourtRecord(caseData);
                }
                
                // 2. 获取已保存的裁决书要素
                console.log('正在查询裁决书要素，case_id:', currentCaseId);
                const elementsResponse = await fetch(`/api/award/elements/${currentCaseId}`);
                const elementsResult = await elementsResponse.json();
                console.log('API返回:', elementsResult);
                
                if (elementsResult.code === 200 && elementsResult.data) {
                    // 填充已保存的数据
                    console.log('使用数据库数据填充');
                    fillFormData(elementsResult.data);
                } else {
                    // 如果没有保存的数据，尝试从案件详情预填充
                    console.log('未找到数据库数据，使用案件信息预填充');
                    prefillFromCaseData();
                }
                
                updatePreview();
                
                showContent();
            } catch (error) {
                console.error('加载数据失败:', error);
                showError('加载数据失败: ' + error.message);
            }
        }

        // 填充表单数据
        function fillFormData(data) {
            if (data.仲裁请求) document.getElementById('arbitrationRequest').value = data.仲裁请求;
            if (data.申请人称) document.getElementById('applicantClaim').value = data.申请人称;
            if (data.被申请人称) document.getElementById('respondentClaim').value = data.被申请人称;
            if (data.经审理查明) document.getElementById('factsFound').value = data.经审理查明;
            if (data.本委认为) document.getElementById('committeeOpinion').value = data.本委认为;
            if (data.终局裁决) document.getElementById('finalDecision').value = data.终局裁决;
            if (data.非终局裁决) document.getElementById('nonFinalDecision').value = data.非终局裁决;
            // 受理时间：将紧凑格式(20250302)转换为中文格式(2025年3月2日)
            if (data.受理时间) {
                const compactDate = data.受理时间;
                if (/^\d{8}$/.test(compactDate)) {
                    const year = compactDate.substring(0, 4);
                    const month = parseInt(compactDate.substring(4, 6));
                    const day = parseInt(compactDate.substring(6, 8));
                    document.getElementById('acceptTime').value = `${year}年${month}月${day}日`;
                } else {
                    document.getElementById('acceptTime').value = data.受理时间;
                }
            }
            
            // 更新状态标记
            document.querySelectorAll('textarea').forEach(ta => checkFieldStatus(ta));
        }

        // 检查庭审笔录
        function checkCourtRecord(caseData) {
            const writingJson = caseData.writing_json || caseData.writingJson || [];
            
            if (!Array.isArray(writingJson) || writingJson.length === 0) {
                showRecordAlert('未找到任何笔录信息，请先上传庭审笔录', 'warning');
                return;
            }
            
            // 查找开庭笔录或庭审笔录
            const courtRecord = writingJson.find(item => {
                const title = item.title || '';
                return title.includes('开庭笔录') || title.includes('庭审笔录');
            });
            
            if (courtRecord) {
                // 使用代理接口下载，解决跨网访问问题
                const originalUrl = `http://10.96.10.78:8080/${courtRecord.save_path || ''}`;
                const proxyUrl = `/api/file/proxy?url=${encodeURIComponent(originalUrl)}`;
                showRecordAlert(
                    `✅ 已找到庭审笔录：${courtRecord.title}`,
                    'success',
                    proxyUrl,
                    originalUrl
                );
            } else {
                // 列出所有可用的文档
                const availableDocs = writingJson
                    .map(item => item.title || '未命名')
                    .filter(title => title !== '未命名')
                    .join('、');
                
                showRecordAlert(
                    `⚠️ 未找到庭审笔录。已上传的文档：${availableDocs || '无'}`,
                    'warning'
                );
            }
        }
        
        // 显示笔录提示
        function showRecordAlert(message, type, proxyUrl = null, originalUrl = null) {
            // 检查是否已存在提示，存在则移除
            const existingAlert = document.getElementById('courtRecordAlert');
            if (existingAlert) {
                existingAlert.remove();
            }
            
            const alertDiv = document.createElement('div');
            alertDiv.id = 'courtRecordAlert';
            
            const isSuccess = type === 'success';
            const bgColor = isSuccess ? 'bg-green-50' : 'bg-yellow-50';
            const borderColor = isSuccess ? 'border-green-200' : 'border-yellow-200';
            const textColor = isSuccess ? 'text-green-800' : 'text-yellow-800';
            const icon = isSuccess ? 'fa-check-circle' : 'fa-exclamation-triangle';
            
            let html = `
                <div class="${bgColor} ${borderColor} border rounded-lg p-4 mb-4">
                    <div class="flex items-start">
                        <i class="fas ${icon} ${textColor} mt-1 mr-3"></i>
                        <div class="flex-1">
                            <p class="${textColor} font-medium">${message}</p>
            `;
            
            if (proxyUrl) {
                html += `
                            <div class="mt-2 flex items-center gap-3">
                                <a href="${proxyUrl}" target="_blank" 
                                   class="inline-flex items-center px-3 py-1.5 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium transition-colors">
                                    <i class="fas fa-download mr-1.5"></i>
                                    下载庭审笔录
                                </a>
                                <span class="text-xs text-gray-500">通过代理服务器安全访问</span>
                            </div>
                `;
            }
            
            html += `
                        </div>
                    </div>
                </div>
            `;
            
            alertDiv.innerHTML = html;
            
            // 插入到内容区域的最上方
            const contentArea = document.getElementById('contentArea');
            if (contentArea) {
                contentArea.insertBefore(alertDiv, contentArea.firstChild);
            }
        }
        
        // 阿拉伯数字转中文数字
        function numToChinese(num) {
            const chineseNums = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
            if (num <= 10) {
                return chineseNums[num];
            } else if (num < 20) {
                return '十' + (num % 10 === 0 ? '' : chineseNums[num % 10]);
            } else if (num < 100) {
                return chineseNums[Math.floor(num / 10)] + '十' + (num % 10 === 0 ? '' : chineseNums[num % 10]);
            }
            return num.toString();
        }

        // 从案件数据预填充
        function prefillFromCaseData() {
            if (!caseData) return;
            
            // 预填充仲裁请求
            const requests = caseData.case_arb_request || caseData.requests || [];
            if (requests.length > 0) {
                const requestText = requests.map((req, idx) => 
                    `${numToChinese(idx + 1)}、${req.intro || req.content || req.request_content || ''}`
                ).join('\n');
                document.getElementById('arbitrationRequest').value = requestText;
            }
            
            // 预填充受理时间
            const handleAt = caseData.handle_at || caseData.filing_date || caseData.create_time;
            if (handleAt) {
                const date = new Date(handleAt);
                if (!isNaN(date.getTime())) {
                    const year = date.getFullYear();
                    const month = date.getMonth() + 1;
                    const day = date.getDate();
                    document.getElementById('acceptTime').value = `${year}年${month}月${day}日`;
                }
            }
            
            // 更新状态标记
            document.querySelectorAll('textarea').forEach(ta => checkFieldStatus(ta));
        }

        // 保存要素到数据库
        async function saveElements() {
            const data = {
                case_id: currentCaseId,
                case_no: currentCaseNo,
                仲裁请求: document.getElementById('arbitrationRequest').value,
                申请人称: document.getElementById('applicantClaim').value,
                被申请人称: document.getElementById('respondentClaim').value,
                经审理查明: document.getElementById('factsFound').value,
                本委认为: document.getElementById('committeeOpinion').value,
                终局裁决: document.getElementById('finalDecision').value,
                非终局裁决: document.getElementById('nonFinalDecision').value,
                受理时间: document.getElementById('acceptTime').value
            };
            
            try {
                const response = await fetch(`/api/award/elements/${currentCaseId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (result.code === 200) {
                    showToast('保存成功！');
                } else {
                    showToast('保存失败: ' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('保存失败:', error);
                showToast('保存失败: ' + error.message);
            }
        }

        // 生成Word（调用Dify Workflow）
        async function generateWord() {
            const data = {
                case_id: currentCaseId,
                case_no: currentCaseNo,
                仲裁请求: document.getElementById('arbitrationRequest').value,
                申请人称: document.getElementById('applicantClaim').value,
                被申请人称: document.getElementById('respondentClaim').value,
                经审理查明: document.getElementById('factsFound').value,
                本委认为: document.getElementById('committeeOpinion').value,
                终局裁决: document.getElementById('finalDecision').value,
                非终局裁决: document.getElementById('nonFinalDecision').value,
                受理时间: document.getElementById('acceptTime').value
            };
            
            // 检查是否有内容
            const hasContent = Object.values(data).some(v => v && typeof v === 'string' && v.trim());
            if (!hasContent) {
                showToast('请先填写裁决书内容');
                return;
            }
            
            showToast('正在生成Word文档...');
            
            try {
                const response = await fetch('/api/award/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '生成失败');
                }
                
                // 下载文件
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `仲裁裁决书_${currentCaseNo || currentCaseId}.docx`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
                
                showToast('Word文档已生成！');
            } catch (error) {
                console.error('生成失败:', error);
                showToast('生成失败: ' + error.message);
            }
        }

        // 选择字段
        function selectField(fieldId) {
            selectedField = fieldId;
            
            // 更新UI
            document.querySelectorAll('.field-card').forEach(card => {
                card.classList.remove('active');
            });
            document.querySelector(`[data-field="${fieldId}"]`).classList.add('active');
            
            // 聚焦输入框
            document.getElementById(fieldId).focus();
        }

        // 检查字段状态
        function checkFieldStatus(textarea) {
            const card = textarea.closest('.field-card');
            const badge = card.querySelector('.status-badge');
            
            if (textarea.value.trim()) {
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // 更新预览
        function updatePreview() {
            const fields = {
                'arbitrationRequest': 'previewSection1',
                'applicantClaim': 'previewSection2',
                'respondentClaim': 'previewSection3',
                'factsFound': 'previewSection4',
                'committeeOpinion': 'previewSection5',
                'finalDecision': 'previewSection6',
                'nonFinalDecision': 'previewSection7'
            };

            // 案号
            const caseNo = document.getElementById('caseNo').value;
            document.getElementById('previewCaseNo').textContent = caseNo;

            // 更新各段落
            for (const [inputId, sectionId] of Object.entries(fields)) {
                const content = document.getElementById(inputId).value;
                const section = document.getElementById(sectionId);
                const paragraph = section.querySelector('p');
                
                if (content && content.trim()) {
                    // 将每行内容单独包裹在div中，确保对齐
                    const lines = content.split('\n');
                    paragraph.innerHTML = lines.map(line => 
                        `<div class="mb-1">${line}</div>`
                    ).join('');
                    section.classList.remove('hidden');
                    setTimeout(() => {
                        section.classList.remove('opacity-0');
                    }, 10);
                } else {
                    section.classList.add('opacity-0');
                    setTimeout(() => {
                        section.classList.add('hidden');
                    }, 500);
                }
            }

            // 页脚
            const hasContent = Object.keys(fields).some(id => 
                document.getElementById(id).value.trim()
            );
            document.getElementById('footerInfo').classList.toggle('hidden', !hasContent);
        }

        // 缩放预览
        function zoomPreview(factor) {
            currentZoom *= factor;
            currentZoom = Math.max(0.5, Math.min(1.5, currentZoom));
            document.getElementById('previewContainer').style.transform = `scale(${currentZoom})`;
            document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
        }

        // 切换标签
        function switchTab(tab) {
            const previewContainer = document.getElementById('previewContainer');
            const aiContainer = document.getElementById('aiContainer');
            const tabPreview = document.getElementById('tabPreview');
            const tabAI = document.getElementById('tabAI');
            const zoomControls = document.getElementById('zoomControls');
            
            if (tab === 'preview') {
                // 显示预览
                previewContainer.classList.remove('hidden');
                aiContainer.classList.add('hidden');
                zoomControls.classList.remove('hidden');
                
                // 更新标签样式
                tabPreview.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
                tabPreview.classList.remove('text-gray-600', 'hover:text-gray-900');
                tabAI.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                tabAI.classList.add('text-gray-600', 'hover:text-gray-900');
            } else {
                // 显示撰写裁决书初稿助手
                previewContainer.classList.add('hidden');
                aiContainer.classList.remove('hidden');
                zoomControls.classList.add('hidden');
                
                // 更新标签样式
                tabAI.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
                tabAI.classList.remove('text-gray-600', 'hover:text-gray-900');
                tabPreview.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                tabPreview.classList.add('text-gray-600', 'hover:text-gray-900');
            }
        }

        // 加载示例

                applicantClaim: '申请人于2023年6月1日入职被申请人公司，担任技术部经理职务，双方签订了为期三年的劳动合同。在职期间，申请人勤勉尽责，但被申请人自2024年1月起无故拖欠工资，并于2024年3月15日单方面解除劳动合同。申请人认为被申请人的行为严重违反了《劳动合同法》的相关规定，侵害了申请人的合法权益。',

            document.getElementById('committeeOpinion').value = example.committeeOpinion;

            document.getElementById('nonFinalDecision').value = example.nonFinalDecision;
            
            // 更新状态
            document.querySelectorAll('textarea').forEach(ta => checkFieldStatus(ta));
            updatePreview();

        // 清空
        function clearAll() {
            if (!confirm('确定要清空所有内容吗？此操作不可撤销。')) return;
            
            ['arbitrationRequest', 'applicantClaim', 'respondentClaim', 'factsFound', 
             'committeeOpinion', 'finalDecision', 'nonFinalDecision'].forEach(id => {
                document.getElementById(id).value = '';
            });
            
            document.querySelectorAll('.status-badge').forEach(badge => badge.classList.add('hidden'));
            updatePreview();
            showToast('已清空所有内容');
        }

        // 显示/隐藏加载状态
        function showLoading() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('contentArea').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');
        }

        function showContent() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('contentArea').classList.remove('hidden');
            document.getElementById('errorState').classList.add('hidden');
        }

        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('contentArea').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        // 显示提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg z-[100] flex items-center gap-2';
            toast.style.animation = 'fadeIn 0.3s ease-out';
            toast.innerHTML = `<i class="fas fa-info-circle text-blue-400"></i> ${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-20px)';
                toast.style.transition = 'all 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

    </script>
