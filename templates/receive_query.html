<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>收件查询 - 劳动仲裁信息查询综合服务平台</title>
    <meta name="version" content="v2.2">
    <script src="{{ url_for('static', filename='js/tailwindcss.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fontawesome.all.min.css') }}">
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-btn.active {
            background-color: #16a34a;
            color: white;
            border-color: #16a34a;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .row-expandable {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .row-expandable:hover {
            background-color: #f0fdf4;
        }
        .detail-panel {
            background-color: #f8fafc;
            border-left: 4px solid #16a34a;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto max-w-7xl p-4">
        <!-- 标题 -->
        <header class="bg-gradient-to-r from-green-600 to-green-800 text-white rounded-xl shadow-lg p-6 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold">
                        <i class="fas fa-inbox mr-2"></i>收件查询
                    </h1>
                    <p class="opacity-90 mt-2">查询内部服务器收件数据</p>
                </div>
                <a href="/cases" class="bg-white text-green-800 px-4 py-2 rounded-lg hover:bg-gray-100 transition">
                    <i class="fas fa-arrow-left mr-2"></i>返回案件管理
                </a>
            </div>
        </header>

        <!-- 查询区域 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <!-- 状态筛选按钮 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">状态筛选</label>
                <div class="flex flex-wrap gap-2">
                    <button onclick="setStatus('')" id="status-all" class="status-btn active px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-sm">
                        全部
                    </button>
                    <button onclick="setStatus('0')" id="status-0" class="status-btn px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-sm">
                        收件登记
                    </button>
                    <button onclick="setStatus('5')" id="status-5" class="status-btn px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-sm">
                        已提交
                    </button>
                    <button onclick="setStatus('1')" id="status-1" class="status-btn px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-sm">
                        审核通过
                    </button>
                    <button onclick="setStatus('3')" id="status-3" class="status-btn px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-sm">
                        审批通过
                    </button>
                    <button onclick="setStatus('2')" id="status-2" class="status-btn px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-sm">
                        审核不通过
                    </button>
                    <button onclick="setStatus('4')" id="status-4" class="status-btn px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-sm">
                        审批不通过
                    </button>
                </div>
            </div>

            <!-- 查询条件 -->
            <div class="flex flex-wrap gap-3 items-end">
                <div class="w-36">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">申请日期</label>
                    <input type="date" id="dateInput" 
                        class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 h-9"
                        value="">
                </div>
                <div class="w-36">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">案件编号</label>
                    <input type="text" id="caseNoInput" 
                        class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 h-9"
                        placeholder="如: 202691">
                </div>
                <div class="w-48">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">关键字</label>
                    <input type="text" id="keywordInput" 
                        class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 h-9"
                        placeholder="申请人/被申请人/案由">
                </div>
                <button onclick="queryReceiveData()" 
                    class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium py-1.5 px-5 rounded-lg transition h-9">
                    <i class="fas fa-search mr-1"></i>查询
                </button>
                <button onclick="resetQuery()" 
                    class="bg-gray-500 hover:bg-gray-600 text-white text-sm font-medium py-1.5 px-5 rounded-lg transition h-9">
                    <i class="fas fa-undo mr-1"></i>重置
                </button>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loadingState" class="hidden bg-white rounded-xl shadow-lg p-12 text-center">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-gray-600">正在查询收件数据...</p>
        </div>

        <!-- 结果列表 -->
        <div id="resultContainer" class="bg-white rounded-xl shadow-lg overflow-hidden hidden">
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-800">
                    <i class="fas fa-list mr-2 text-green-600"></i>查询结果
                </h2>
                <span id="resultCount" class="text-sm text-gray-600"></span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 w-20">序号</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 w-48">收件编号</th>
                            <th class="px-2 py-3 text-left text-sm font-semibold text-gray-700 w-20">申请人</th>
                            <th class="px-2 py-3 text-left text-sm font-semibold text-gray-700 w-32">被申请人</th>
                            <th class="px-4 py-3 pr-2 text-left text-sm font-semibold text-gray-700 w-32">案由</th>
                            <th class="pl-2 pr-4 py-3 text-left text-sm font-semibold text-gray-700 w-32">申请日期</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 w-[108px]">状态</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 w-44">操作</th>
                        </tr>
                    </thead>
                    <tbody id="resultTableBody" class="divide-y divide-gray-200">
                        <!-- 动态填充 -->
                    </tbody>
                </table>
            </div>
            
            <!-- 分页 -->
            <div class="bg-gray-50 px-6 py-4 flex justify-between items-center border-t border-gray-200">
                <span id="paginationInfo" class="text-sm text-gray-600"></span>
                <div class="flex gap-2">
                    <button id="prevBtn" onclick="changePage(-1)" 
                        class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <span id="pageInfo" class="px-4 py-2 text-sm text-gray-700"></span>
                    <button id="nextBtn" onclick="changePage(1)" 
                        class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 空状态提示 -->
        <div id="emptyState" class="hidden bg-white rounded-xl shadow-lg p-12 text-center">
            <i class="fas fa-inbox text-gray-300 text-5xl mb-4"></i>
            <p class="text-gray-500 text-lg">暂无数据</p>
            <p class="text-gray-400 text-sm mt-2">请调整查询条件后点击查询</p>
        </div>

        <!-- 错误提示 -->
        <div id="errorState" class="hidden bg-white rounded-xl shadow-lg p-12 text-center">
            <i class="fas fa-exclamation-circle text-red-400 text-5xl mb-4"></i>
            <p class="text-red-500 text-lg" id="errorMessage">查询失败</p>
        </div>
    </div>

    <!-- 生成文书弹窗 -->
    <div id="generateModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-2xl w-[900px] max-w-[95vw] max-h-[90vh] flex flex-col overflow-hidden">
            <!-- 弹窗头部 -->
            <div class="bg-gradient-to-r from-green-600 to-green-800 text-white px-6 py-4 rounded-t-xl flex justify-between items-center">
                <div>
                    <h3 class="text-lg font-bold"><i class="fas fa-file-alt mr-2"></i>生成文书</h3>
                    <p class="text-sm opacity-90 mt-1" id="modalCaseNo">案件编号: -</p>
                </div>
                <button onclick="closeGenerateModal()" class="text-white hover:text-gray-200 text-2xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- 弹窗内容 -->
            <div class="p-6 flex-1 overflow-hidden flex flex-col">
                <p class="text-gray-600 text-sm mb-4">请选择要生成的文书模板（最多三层选择）：</p>
                
                <!-- 三级选择器 -->
                <div class="flex gap-4 flex-1 min-h-0" style="max-height: calc(90vh - 280px);">
                    <!-- 第一级 -->
                    <div class="flex-1 border border-gray-200 rounded-lg overflow-hidden flex flex-col">
                        <div class="bg-gray-50 px-4 py-2 border-b border-gray-200">
                            <span class="text-sm font-medium text-gray-700">第一步：选择分类</span>
                        </div>
                        <div id="level1List" class="flex-1 overflow-y-auto p-2">
                            <!-- 动态填充 -->
                        </div>
                    </div>
                    
                    <!-- 第二级 -->
                    <div class="flex-1 border border-gray-200 rounded-lg overflow-hidden flex flex-col">
                        <div class="bg-gray-50 px-4 py-2 border-b border-gray-200">
                            <span class="text-sm font-medium text-gray-700">第二步：选择子项</span>
                        </div>
                        <div id="level2List" class="flex-1 overflow-y-auto p-2">
                            <div class="text-center text-gray-400 mt-8 text-sm">请先选择分类</div>
                        </div>
                    </div>
                    
                    <!-- 第三级 -->
                    <div class="flex-1 border border-gray-200 rounded-lg overflow-hidden flex flex-col">
                        <div class="bg-gray-50 px-4 py-2 border-b border-gray-200">
                            <span class="text-sm font-medium text-gray-700">第三步：选择文书</span>
                        </div>
                        <div id="level3List" class="flex-1 overflow-y-auto p-2">
                            <div class="text-center text-gray-400 mt-8 text-sm">请先选择子项</div>
                        </div>
                    </div>
                </div>
                
                <!-- 已选文件显示 -->
                <div class="mt-4 p-3 bg-gray-50 rounded-lg">
                    <span class="text-sm text-gray-600">已选择：</span>
                    <span id="selectedPath" class="text-sm font-medium text-green-700">无</span>
                </div>
            </div>
            
            <!-- 弹窗底部 -->
            <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
                <button onclick="closeGenerateModal()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                    取消
                </button>
                <button id="confirmGenerateBtn" onclick="confirmGenerate()" disabled
                    class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-download mr-2"></i>下载模板
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "/api";
        let currentPage = 1;
        let pageSize = 20;
        let totalItems = 0;
        let currentParams = {};
        let currentData = []; // 保存当前数据以便展开详情

        // 状态映射
        const statusMap = {
            0: { text: '收件登记', class: 'bg-gray-100 text-gray-800' },
            1: { text: '审核通过', class: 'bg-green-100 text-green-800' },
            2: { text: '审核不通过', class: 'bg-red-100 text-red-800' },
            3: { text: '审批通过', class: 'bg-blue-100 text-blue-800' },
            4: { text: '审批不通过', class: 'bg-orange-100 text-orange-800' },
            5: { text: '已提交', class: 'bg-purple-100 text-purple-800' },
        };

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 默认加载全部数据
            queryReceiveData();
        });

        // 设置状态
        function setStatus(status) {
            // 更新按钮样式
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(status === '' ? 'status-all' : `status-${status}`).classList.add('active');
            
            // 清空其他筛选条件
            document.getElementById('caseNoInput').value = '';
            document.getElementById('dateInput').value = '';
            
            // 构建参数（空字符串不加入参数）
            currentParams = {};
            if (status) currentParams.status = status;
            
            currentPage = 1;
            fetchData();
        }

        // 转换案件编号格式，支持多种输入：
        // 202691 -> [2026]91
        // 2026]91 -> [2026]91
        // 明永劳人仲收[2026]91号 -> [2026]91 (提取核心部分)
        function convertCaseNo(caseNo) {
            caseNo = caseNo.trim();
            
            // 如果已经是完整格式 [2026]91，直接返回
            if (/^\[\d{4}\]\d+$/.test(caseNo)) {
                return caseNo;
            }
            
            // 如果是 2026]91 格式，补充左括号
            if (/^\d{4}\]\d+$/.test(caseNo)) {
                return '[' + caseNo;
            }
            
            // 如果是 20263 或 202691 纯数字格式（4位年份+至少1位序号）
            if (/^\d{5,}$/.test(caseNo)) {
                const year = caseNo.slice(0, 4);
                const num = caseNo.slice(4);
                return `[${year}]${num}`;
            }
            
            // 如果是完整案件编号（如 明永劳人仲收[2026]91号），提取 [2026]91 部分
            const match = caseNo.match(/\[(\d{4})\](\d+)/);
            if (match) {
                return `[${match[1]}]${match[2]}`;
            }
            
            return caseNo;
        }

        // 查询收件数据
        async function queryReceiveData() {
            const date = document.getElementById('dateInput').value;
            let caseNo = document.getElementById('caseNoInput').value.trim();
            const keyword = document.getElementById('keywordInput').value.trim();
            
            // 转换案件编号格式
            if (caseNo) {
                caseNo = convertCaseNo(caseNo);
                // 更新输入框显示转换后的格式
                document.getElementById('caseNoInput').value = caseNo;
            }
            
            // 获取当前选中的状态
            let status = '';
            const activeBtn = document.querySelector('.status-btn.active');
            if (activeBtn && activeBtn.id !== 'status-all') {
                status = activeBtn.id.replace('status-', '');
            }
            
            currentParams = {};
            if (date) currentParams.application_date = date;
            if (caseNo) currentParams.case_no = caseNo;
            if (keyword) currentParams.search = keyword;
            if (status) currentParams.status = status;
            
            currentPage = 1;
            await fetchData();
        }

        // 获取数据
        async function fetchData() {
            showLoading();
            
            try {
                // 构建查询参数（过滤掉空值）
                const paramsObj = {
                    page: currentPage,
                    page_size: pageSize
                };
                
                // 只添加非空参数
                Object.keys(currentParams).forEach(key => {
                    const value = currentParams[key];
                    if (value !== '' && value !== undefined && value !== null) {
                        paramsObj[key] = value;
                    }
                });
                
                const params = new URLSearchParams(paramsObj);
                const requestUrl = `${API_BASE_URL}/receive/query?${params}`;
                
                // 调试日志
                console.log('请求URL:', requestUrl);
                console.log('请求参数:', paramsObj);
                
                const response = await fetch(requestUrl);
                
                console.log('响应状态:', response.status);
                console.log('响应头:', [...response.headers.entries()]);
                
                // 检查响应状态
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
                }
                
                // 获取响应文本
                const responseText = await response.text();
                console.log('响应文本前200字符:', responseText.substring(0, 200));
                
                // 尝试解析 JSON
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON解析失败:', parseError);
                    console.error('响应内容:', responseText);
                    throw new Error('服务器返回的数据格式不正确');
                }
                
                console.log('解析后的结果:', result);
                
                // 处理嵌套结构: {code: 200, data: {code: 200, data: {...}, message: "成功"}}
                const innerResult = result.data || {};
                if ((result.code === 200 || result.code === 0) && 
                    (innerResult.code === 200 || innerResult.code === 0)) {
                    renderData(innerResult.data);
                } else {
                    const errorMsg = innerResult.message || result.message || `查询失败 (code: ${result.code})`;
                    showError(errorMsg);
                }
            } catch (error) {
                console.error('查询失败:', error);
                showError('查询失败: ' + error.message);
            }
        }

        // 渲染数据
        function renderData(data) {
            // API返回的数据结构: { data: [...], totalNum: number, page: [offset, limit] }
            const list = data.data || [];
            totalItems = data.totalNum || 0;
            currentData = list; // 保存数据
            
            // 调试：打印第一条数据的完整结构
            if (list.length > 0) {
                console.log('第一条数据:', JSON.stringify(list[0], null, 2));
                console.log('案由相关字段:', {
                    'item.case_reason': list[0].case_reason,
                    'item.cases?.case_reason': list[0].cases?.case_reason,
                    'item.reason': list[0].reason,
                    'item.cases': list[0].cases
                });
            }
            
            if (list.length === 0) {
                showEmpty();
                return;
            }
            
            const tbody = document.getElementById('resultTableBody');
            document.getElementById('resultCount').textContent = `共 ${totalItems} 条记录`;
            
            tbody.innerHTML = list.map((item, index) => {
                const seqNo = (currentPage - 1) * pageSize + index + 1;
                const statusInfo = statusMap[item.status] || { text: '未知', class: 'bg-gray-100 text-gray-800' };
                
                // 获取申请人信息
                const applicantName = item.applicant || '-';
                
                // 获取被申请人信息
                const respondentName = item.respondent || '-';
                
                // 获取案由 - 尝试多个可能的位置
                const caseReason = item.case_reason || item.cases?.case_reason || item.reason || '-';
                
                // 申请日期
                const applyDate = formatDate(item.application_at || item.cases?.apply_at);
                
                return `
                    <tr class="row-expandable fade-in" onclick="toggleDetail(${index})">
                        <td class="px-4 py-3 text-sm text-gray-900">${seqNo}</td>
                        <td class="px-4 py-3 text-sm font-medium text-green-600">${escapeHtml(item.case_no || '-')}</td>
                        <td class="px-2 py-3 text-sm text-gray-700 truncate" title="${escapeHtml(applicantName)}">${escapeHtml(applicantName)}</td>
                        <td class="px-4 py-3 text-sm text-gray-700 truncate max-w-xs" title="${escapeHtml(respondentName)}">${escapeHtml(respondentName)}</td>
                        <td class="px-4 pr-2 py-3 text-sm text-gray-700">${escapeHtml(caseReason)}</td>
                        <td class="pl-2 pr-4 py-3 text-sm text-gray-700">${applyDate}</td>
                        <td class="px-4 py-3 text-sm">
                            <span class="status-badge ${statusInfo.class}">${statusInfo.text}</span>
                        </td>
                        <td class="px-4 py-3 text-sm">
                            <div class="flex items-center gap-2">
                                <button onclick="event.stopPropagation(); viewDetail(${item.id})" 
                                    class="text-blue-600 hover:text-blue-800 font-medium" title="查看详情">
                                    <i class="fas fa-eye"></i> 查看
                                </button>
                                <i class="fas fa-chevron-down text-gray-400 transition-transform" id="icon-${index}"></i>
                            </div>
                        </td>
                    </tr>
                    <tr id="detail-${index}" class="hidden">
                        <td colspan="8" class="detail-panel px-6 py-4">
                            ${renderDetailPanel(item)}
                        </td>
                    </tr>
                `;
            }).join('');
            
            updatePagination();
            showResult();
        }

        // 渲染详情面板
        function renderDetailPanel(item) {
            const applicant = item.applicant_arr?.[0] || {};
            const respondent = item.respondent_arr?.[0] || {};
            const caseInfo = item.cases || {};
            const group = item.groups || {};
            
            return `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-sm">
                    <!-- 申请人信息 -->
                    <div class="bg-white rounded-lg p-4 shadow-sm">
                        <h4 class="font-semibold text-green-700 mb-3 border-b pb-2">
                            <i class="fas fa-user mr-2"></i>申请人信息
                        </h4>
                        <div class="space-y-2">
                            <div class="flex justify-between">
                                <span class="text-gray-500">姓名:</span>
                                <span class="font-medium">${escapeHtml(applicant.name || '-')}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">性别:</span>
                                <span>${escapeHtml(applicant.sex || '-')}</span>

        // 查看详情 - 跳转到新页面
        function viewDetail(id) {

        // 切换详情显示
        function toggleDetail(index) {
            const detailRow = document.getElementById(`detail-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            
            if (detailRow.classList.contains('hidden')) {
                detailRow.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                detailRow.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }

        // 更新分页
        function updatePagination() {
            const totalPages = Math.ceil(totalItems / pageSize);
            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(currentPage * pageSize, totalItems);
            
            document.getElementById('paginationInfo').textContent = 
                totalItems > 0 ? `显示 ${start}-${end} 条，共 ${totalItems} 条` : '暂无数据';
            
            document.getElementById('pageInfo').textContent = 
                totalPages > 0 ? `第 ${currentPage} / ${totalPages} 页` : '-';
            
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages || totalPages === 0;
        }

        // 切换页码
        function changePage(delta) {
            const totalPages = Math.ceil(totalItems / pageSize);
            const newPage = currentPage + delta;
            
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                fetchData();
                // 滚动到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // 重置查询
        function resetQuery() {
            document.getElementById('dateInput').value = '';
            document.getElementById('caseNoInput').value = '';
            document.getElementById('keywordInput').value = '';
            
            // 重置状态按钮
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('status-all').classList.add('active');
            
            currentParams = {};
            currentPage = 1;
            totalItems = 0;
            
            // 重新查询
            queryReceiveData();

            document.getElementById('errorState').classList.add('hidden');

            document.getElementById('errorState').classList.add('hidden');

            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '-';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr.split(' ')[0] || dateStr;
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            
            return `${year}-${month}-${day}`;
        }

        // 格式化日期时间
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr;
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }

        document.getElementById('caseNoInput').addEventListener('keypress', function(e) {

                queryReceiveData();

        // ==================== 生成文书弹窗相关 ====================
        
        let docTemplatesTree = []; // 文档模板树
        let selectedLevel1 = null; // 第一级选中项
        let selectedLevel2 = null; // 第二级选中项
        let selectedFile = null;   // 最终选中的文件
        let currentCaseId = null;  // 当前案件ID
        let currentCaseNo = '';    // 当前案件编号
        let currentApplicants = []; // 当前案件的申请人列表

        // 打开生成弹窗
        async function openGenerateModal(caseId, caseNo) {
            currentCaseId = caseId;
            currentCaseNo = caseNo;
            
            document.getElementById('modalCaseNo').textContent = `案件编号: ${caseNo || '-'}`;
            document.getElementById('generateModal').classList.remove('hidden');
            
            // 重置选择状态
            selectedLevel1 = null;
            selectedLevel2 = null;
            selectedFile = null;
            currentApplicants = [];
            updateSelectedPath();
            
            // 加载案件详情获取申请人信息
            await loadCaseApplicants(caseId);
            
            // 加载模板树
            await loadDocTemplatesTree();
        }
        
        // 加载案件申请人信息
        async function loadCaseApplicants(caseId) {
            try {
                const response = await fetch(`${API_BASE_URL}/receive/detail?id=${caseId}`);
                const result = await response.json();
                
                if (result.code === 200 && result.data) {
                    // 处理嵌套结构
                    let data = result.data.data;
                    if (data && data.data) {
                        data = data.data;
                    }
                    
                    // 获取申请人列表
                    const applicants = data.applicant || [];
                    currentApplicants = applicants.map(app => ({
                        id: app.id || '',
                        name: app.name || app.applicant_name || '',
                        selected: false
                    })).filter(app => app.name);
                }
            } catch (error) {
                console.error('加载申请人信息失败:', error);
                currentApplicants = [];
            }
        }
        
        // 检查文件是否需要选择申请人
        function requiresApplicantSelection(filePath, fileName) {
            // 检查路径是否包含"5-撤诉文书"
            const isWithdrawalDoc = filePath.includes('5-撤诉文书');
            // 检查文件名是否以"0"开头
            const startsWithZero = fileName && fileName.startsWith('0');
            return isWithdrawalDoc && startsWithZero;
        }
        
        // 显示申请人选择对话框
        function showApplicantSelector(callback) {
            // 检查是否有可用的申请人
            if (currentApplicants.length === 0) {
                alert('未能获取到申请人信息，请检查案件数据');
                return;
            }
            
            // 创建对话框容器
            const modal = document.createElement('div');
            modal.id = 'applicantSelectorModal';
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4';
            
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl w-[500px] max-w-[95vw] max-h-[80vh] flex flex-col">
                    <div class="bg-gradient-to-r from-green-600 to-green-800 text-white px-6 py-4 rounded-t-xl flex justify-between items-center">
                        <div>
                            <h3 class="text-lg font-bold"><i class="fas fa-user-check mr-2"></i>选择申请人</h3>
                            <p class="text-sm opacity-90 mt-1">${selectedFile ? selectedFile.displayName : ''}</p>
                        </div>
                        <button onclick="closeApplicantSelector()" class="text-white hover:text-gray-200 text-2xl">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="p-6 flex-1 overflow-hidden flex flex-col">
                        <p class="text-gray-600 text-sm mb-3">请选择需要生成文书的申请人（至少选择一位）：</p>
                        <div class="flex-1 overflow-y-auto border border-gray-200 rounded-lg p-2">
                            ${currentApplicants.map((app, index) => `
                                <div class="applicant-option flex items-center p-3 rounded-lg hover:bg-gray-50 cursor-pointer" onclick="toggleApplicantSelection(${index})">
                                    <input type="checkbox" id="applicant-check-${index}" class="w-4 h-4 text-green-600 border-gray-300 rounded focus:ring-green-500 cursor-pointer" 
                                        onchange="updateSelectAllState()">
                                    <label for="applicant-check-${index}" class="ml-3 flex-1 cursor-pointer">
                                        <span class="font-medium text-gray-800">${app.name}</span>
                                    </label>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-3 flex items-center justify-between">
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" id="selectAllApplicants" class="w-4 h-4 text-green-600 border-gray-300 rounded focus:ring-green-500" onchange="toggleSelectAllApplicants()">
                                <span class="ml-2 text-sm text-gray-700">全选</span>
                            </label>
                            <span id="selectedCountDisplay" class="text-sm text-gray-500">已选择 0 位</span>
                        </div>
                    </div>
                    <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
                        <button onclick="closeApplicantSelector()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                            取消
                        </button>
                        <button onclick="confirmApplicantSelection()" id="confirmApplicantBtn" disabled
                            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-check mr-2"></i>确认选择
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 点击外部关闭
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeApplicantSelector();
                }
            });
            
            // 保存回调函数
            window.applicantSelectorCallback = callback;
        }
        
        // 关闭申请人选择对话框
        window.closeApplicantSelector = function() {
            const modal = document.getElementById('applicantSelectorModal');
            if (modal) {
                modal.remove();
            }
            delete window.applicantSelectorCallback;
        };
        
        // 切换申请人选择
        window.toggleApplicantSelection = function(index) {
            const checkbox = document.getElementById(`applicant-check-${index}`);
            checkbox.checked = !checkbox.checked;
            updateSelectAllState();
        };
        
        // 切换全选
        window.toggleSelectAllApplicants = function() {
            const selectAllCheckbox = document.getElementById('selectAllApplicants');
            const checkboxes = document.querySelectorAll('[id^="applicant-check-"]');
            checkboxes.forEach(cb => {
                cb.checked = selectAllCheckbox.checked;
            });
            updateSelectAllState();
        };
        
        // 更新全选状态
        window.updateSelectAllState = function() {
            const checkboxes = document.querySelectorAll('[id^="applicant-check-"]');
            const checkedBoxes = document.querySelectorAll('[id^="applicant-check-"]:checked');
            const selectAllCheckbox = document.getElementById('selectAllApplicants');
            
            if (selectAllCheckbox) {
                selectAllCheckbox.checked = checkboxes.length > 0 && checkboxes.length === checkedBoxes.length;
            }
            
            const confirmBtn = document.getElementById('confirmApplicantBtn');
            if (confirmBtn) {
                confirmBtn.disabled = checkedBoxes.length === 0;
            }
            
            const countDisplay = document.getElementById('selectedCountDisplay');
            if (countDisplay) {
                countDisplay.textContent = `已选择 ${checkedBoxes.length} 位`;
            }
        };
        
        // 确认申请人选择
        window.confirmApplicantSelection = function() {
            const checkboxes = document.querySelectorAll('[id^="applicant-check-"]:checked');
            const selectedApplicants = [];
            checkboxes.forEach(cb => {
                const index = parseInt(cb.id.replace('applicant-check-', ''));
                if (currentApplicants[index]) {
                    selectedApplicants.push(currentApplicants[index]);
                }
            });
            
            if (selectedApplicants.length > 0 && window.applicantSelectorCallback) {
                window.applicantSelectorCallback(selectedApplicants);
            }
            closeApplicantSelector();
        };

        // 关闭生成弹窗
        function closeGenerateModal() {
            document.getElementById('generateModal').classList.add('hidden');
            currentCaseId = null;
            currentCaseNo = '';
        }

        // 加载文档模板树
        async function loadDocTemplatesTree() {
            try {
                const response = await fetch(`${API_BASE_URL}/doc_templates/tree`);
                const result = await response.json();
                
                if (result.code === 200 && result.data) {
                    docTemplatesTree = result.data;
                    renderLevel1();
                    
                    // 自动选择第一个一级目录（如果有数据）
                    if (docTemplatesTree.length > 0) {
                        selectLevel1(0);
                    }
                } else {
                    document.getElementById('level1List').innerHTML = 
                        `<div class="text-center text-red-400 mt-8 text-sm">加载失败: ${result.message || '未知错误'}</div>`;
                }
            } catch (error) {
                console.error('加载文档模板失败:', error);
                document.getElementById('level1List').innerHTML = 
                    `<div class="text-center text-red-400 mt-8 text-sm">加载失败: ${error.message}</div>`;
            }
        }

        // 渲染第一级（5个文件夹）
        function renderLevel1() {
            const container = document.getElementById('level1List');
            
            if (docTemplatesTree.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">暂无分类</div>';
                return;
            }
            
            container.innerHTML = docTemplatesTree.map((item, index) => `
                <div onclick="selectLevel1(${index})" 
                    class="level1-item cursor-pointer px-3 py-2 rounded-lg hover:bg-green-50 transition mb-1 ${selectedLevel1 === index ? 'bg-green-100 border border-green-300' : ''}"
                    data-index="${index}">
                    <div class="flex items-center">
                        <i class="fas fa-folder ${selectedLevel1 === index ? 'text-green-600' : 'text-yellow-500'} mr-2"></i>
                        <span class="text-sm ${selectedLevel1 === index ? 'font-medium text-green-800' : 'text-gray-700'}">${escapeHtml(item.displayName)}</span>
                    </div>
                </div>
            `).join('');
        }

        // 选择第一级
        function selectLevel1(index) {
            selectedLevel1 = index;
            selectedLevel2 = null;
            selectedFile = null;
            renderLevel1();
            renderLevel2();
            document.getElementById('level3List').innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">请先选择子项</div>';
            updateSelectedPath();
        }

        // 渲染第二级
        function renderLevel2() {
            const container = document.getElementById('level2List');
            
            if (selectedLevel1 === null) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">请先选择分类</div>';
                return;
            }
            
            const level1Item = docTemplatesTree[selectedLevel1];
            const children = level1Item.children || [];
            
            if (children.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">该分类下无文件</div>';
                return;
            }
            
            container.innerHTML = children.map((item, index) => {
                const isFolder = item.type === 'folder';
                const iconClass = isFolder ? 'fa-folder text-yellow-500' : 'fa-file text-blue-500';
                const isSelected = selectedLevel2 === index;
                
                return `
                <div onclick="selectLevel2(${index})" 
                    class="level2-item cursor-pointer px-3 py-2 rounded-lg hover:bg-green-50 transition mb-1 ${isSelected ? 'bg-green-100 border border-green-300' : ''}"
                    data-index="${index}">
                    <div class="flex items-center">
                        <i class="fas ${iconClass} ${isSelected ? 'text-green-600' : ''} mr-2"></i>
                        <span class="text-sm ${isSelected ? 'font-medium text-green-800' : 'text-gray-700'}">${escapeHtml(item.displayName)}</span>
                    </div>
                </div>
            `;
            }).join('');
        }

        // 选择第二级
        function selectLevel2(index) {
            selectedLevel2 = index;
            selectedFile = null;
            renderLevel2();
            
            const level1Item = docTemplatesTree[selectedLevel1];
            const level2Item = level1Item.children[selectedLevel2];
            
            // 如果是文件，直接选中
            if (level2Item.type === 'file') {
                selectedFile = level2Item;
                document.getElementById('level3List').innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">已选择文件</div>';
            } else {
                // 如果是文件夹，渲染第三级
                renderLevel3();
            }
            
            updateSelectedPath();
        }

        // 渲染第三级
        function renderLevel3() {
            const container = document.getElementById('level3List');
            
            if (selectedLevel1 === null || selectedLevel2 === null) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">请先选择子项</div>';
                return;
            }
            
            const level1Item = docTemplatesTree[selectedLevel1];
            const level2Item = level1Item.children[selectedLevel2];
            
            if (level2Item.type !== 'folder') {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">已选择文件</div>';
                return;
            }
            
            const children = level2Item.children || [];
            
            // 过滤出文件
            const files = children.filter(item => item.type === 'file');
            
            if (files.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">该文件夹下无文件</div>';
                return;
            }
            
            container.innerHTML = files.map((item, index) => {
                const isSelected = selectedFile && selectedFile.path === item.path;
                const extIcon = getFileIcon(item.ext);
                // 检查文件是否需要选择申请人
                const needsApplicant = requiresApplicantSelection(item.path, item.displayName);
                
                return `
                <div onclick="selectLevel3(${index})" 
                    class="level3-item cursor-pointer px-3 py-2 rounded-lg hover:bg-green-50 transition mb-1 ${isSelected ? 'bg-green-100 border border-green-300' : ''}"
                    data-index="${index}">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <i class="fas ${extIcon} ${isSelected ? 'text-green-600' : 'text-blue-500'} mr-2"></i>
                            <span class="text-sm ${isSelected ? 'font-medium text-green-800' : 'text-gray-700'}">${escapeHtml(item.displayName)}</span>
                            ${needsApplicant ? '<span class="ml-1 px-1 py-0.5 bg-orange-100 text-orange-600 text-xs rounded" title="需要选择申请人">需选人</span>' : ''}
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }

        // 选择第三级（文件）
        function selectLevel3(index) {
            const level1Item = docTemplatesTree[selectedLevel1];
            const level2Item = level1Item.children[selectedLevel2];
            const files = (level2Item.children || []).filter(item => item.type === 'file');
            
            selectedFile = files[index];
            renderLevel3();
            updateSelectedPath();
        }

        // 根据扩展名获取文件图标
        function getFileIcon(ext) {
            const iconMap = {
                '.doc': 'fa-file-word',
                '.docx': 'fa-file-word',
                '.xls': 'fa-file-excel',
                '.xlsx': 'fa-file-excel',
                '.pdf': 'fa-file-pdf',
                '.txt': 'fa-file-alt'
            };
            return iconMap[ext] || 'fa-file';
        }

        // 更新已选路径显示
        function updateSelectedPath() {
            const pathEl = document.getElementById('selectedPath');
            const confirmBtn = document.getElementById('confirmGenerateBtn');
            
            if (!selectedFile) {
                pathEl.textContent = '无';
                pathEl.className = 'text-sm font-medium text-gray-400';
                confirmBtn.disabled = true;
                return;
            }
            
            // 构建路径显示
            const parts = [];
            if (selectedLevel1 !== null) {
                parts.push(docTemplatesTree[selectedLevel1].displayName);
            }
            if (selectedLevel2 !== null) {
                const level2Item = docTemplatesTree[selectedLevel1].children[selectedLevel2];
                if (level2Item.type === 'folder') {
                    parts.push(level2Item.displayName);
                }
            }
            parts.push(selectedFile.displayName);
            
            pathEl.textContent = parts.join(' > ');
            pathEl.className = 'text-sm font-medium text-green-700';
            confirmBtn.disabled = false;
        }

        // 确认生成（下载文件）
        function confirmGenerate() {
            if (!selectedFile) {
                alert('请先选择要下载的文书模板');
                return;
            }
            
            // 检查是否需要选择申请人
            if (requiresApplicantSelection(selectedFile.path, selectedFile.displayName)) {
                showApplicantSelector(function(selectedApplicants) {
                    // 为每个选中的申请人生成文件
                    generateForApplicants(selectedApplicants);
                });
                return;
            }
            
            // 不需要选择申请人的，直接下载原始文件
            downloadTemplateFile(selectedFile.path, selectedFile.name);
            closeGenerateModal();
        }
        
        // 下载模板文件
        function downloadTemplateFile(path, filename) {
            const downloadUrl = `${API_BASE_URL}/doc_templates/download?path=${encodeURIComponent(path)}`;
            const link = document.createElement('a');
            link.href = downloadUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        // 为选中的申请人批量生成文档
        async function generateForApplicants(applicants) {
            if (!currentCaseId || applicants.length === 0) return;
            
            const btn = document.getElementById('confirmGenerateBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>生成中...';
            btn.disabled = true;
            
            try {
                // 准备请求数据
                const requestData = {
                    template_paths: [selectedFile.path],
                    case_id: currentCaseId,
                    file_applicant_map: applicants.map(app => ({
                        path: selectedFile.path,
                        applicant_name: app.name,
                        applicant_id: app.id
                    }))
                };
                
                // 调用批量生成API
                const response = await fetch(`${API_BASE_URL}/doc_templates/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || `生成失败: ${response.status}`);
                }
                
                // 获取文件名
                const disposition = response.headers.get('content-disposition');
                let filename = '生成的文书.zip';
                if (disposition) {
                    const filenameStarMatch = disposition.match(/filename\*=UTF-8''([^;]+)/i);
                    if (filenameStarMatch) {
                        try {
                            filename = decodeURIComponent(filenameStarMatch[1]);
                        } catch (e) {
                            filename = filenameStarMatch[1];
                        }
                    } else {
                        const match = disposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
                        if (match) filename = match[1].replace(/['"]/g, '');
                    }
                }
                
                // 下载文件
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
                
                // 关闭弹窗
                closeGenerateModal();
                
            } catch (error) {
                console.error('生成文档失败:', error);
                alert('生成文档失败: ' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // 点击弹窗外部关闭
        document.getElementById('generateModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeGenerateModal();
            }
        });
    </script>
</body>
</html>
