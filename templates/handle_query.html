<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>立案查询 - 劳动仲裁信息查询综合服务平台</title>
    <meta name="version" content="v1.1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #9333ea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .row-expandable {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .row-expandable:hover {
            background-color: #faf5ff;
        }
        .detail-panel {
            background-color: #faf5ff;
            border-left: 4px solid #9333ea;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto max-w-7xl p-4">
        <!-- 标题 -->
        <header class="bg-gradient-to-r from-purple-600 to-purple-800 text-white rounded-xl shadow-lg p-6 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold">
                        <i class="fas fa-gavel mr-2"></i>立案查询
                    </h1>
                    <p class="opacity-90 mt-2">查询内部服务器立案处理数据</p>
                </div>
                <a href="/cases" class="bg-white text-purple-800 px-4 py-2 rounded-lg hover:bg-gray-100 transition">
                    <i class="fas fa-arrow-left mr-2"></i>返回案件管理
                </a>
            </div>
        </header>

        <!-- 查询区域 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <div class="flex flex-wrap gap-3 items-end">
                <div class="w-40">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">案件编号</label>
                    <input type="text" id="caseNoInput" 
                        class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 h-9"
                        placeholder="如: 202691">
                </div>
                <div class="w-48">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">关键字</label>
                    <input type="text" id="keywordInput" 
                        class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 h-9"
                        placeholder="申请人/被申请人/案由">
                </div>
                <button onclick="queryHandleData()" 
                    class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium py-1.5 px-5 rounded-lg transition h-9">
                    <i class="fas fa-search mr-1"></i>查询
                </button>
                <button onclick="resetQuery()" 
                    class="bg-gray-500 hover:bg-gray-600 text-white text-sm font-medium py-1.5 px-5 rounded-lg transition h-9">
                    <i class="fas fa-undo mr-1"></i>重置
                </button>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loadingState" class="hidden bg-white rounded-xl shadow-lg p-12 text-center">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-gray-600">正在查询立案数据...</p>
        </div>

        <!-- 结果列表 -->
        <div id="resultContainer" class="bg-white rounded-xl shadow-lg overflow-hidden hidden">
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-800">
                    <i class="fas fa-list mr-2 text-purple-600"></i>查询结果
                </h2>
                <span id="resultCount" class="text-sm text-gray-600"></span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 w-16">序号</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 w-48">案件编号</th>
                            <th class="px-2 py-3 text-left text-sm font-semibold text-gray-700 w-24">申请人</th>
                            <th class="px-2 py-3 text-left text-sm font-semibold text-gray-700 w-32">被申请人</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 w-32">案由</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 w-28">立案日期</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 w-24">状态</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 w-44">操作</th>
                        </tr>
                    </thead>
                    <tbody id="resultTableBody" class="divide-y divide-gray-200">
                        <!-- 动态填充 -->
                    </tbody>
                </table>
            </div>
            
            <!-- 分页 -->
            <div class="bg-gray-50 px-6 py-4 flex justify-between items-center border-t border-gray-200">
                <span id="paginationInfo" class="text-sm text-gray-600"></span>
                <div class="flex gap-2">
                    <button id="prevBtn" onclick="changePage(-1)" 
                        class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <span id="pageInfo" class="px-4 py-2 text-sm text-gray-700"></span>
                    <button id="nextBtn" onclick="changePage(1)" 
                        class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 空状态提示 -->
        <div id="emptyState" class="hidden bg-white rounded-xl shadow-lg p-12 text-center">
            <i class="fas fa-inbox text-gray-300 text-5xl mb-4"></i>
            <p class="text-gray-500 text-lg">暂无数据</p>
            <p class="text-gray-400 text-sm mt-2">请调整查询条件后点击查询</p>
        </div>

        <!-- 错误提示 -->
        <div id="errorState" class="hidden bg-white rounded-xl shadow-lg p-12 text-center">
            <i class="fas fa-exclamation-circle text-red-400 text-5xl mb-4"></i>
            <p class="text-red-500 text-lg" id="errorMessage">查询失败</p>
        </div>
    </div>

    <!-- 生成文书弹窗 -->
    <div id="generateModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-[1100px] max-w-[95vw] h-[90vh] flex flex-col">
            <!-- 弹窗头部 -->
            <div class="bg-gradient-to-r from-purple-600 to-purple-800 text-white px-6 py-4 rounded-t-xl flex justify-between items-center">
                <div>
                    <h3 class="text-lg font-bold"><i class="fas fa-file-alt mr-2"></i>生成文书</h3>
                    <p class="text-sm opacity-90 mt-1" id="modalCaseNo">案件编号: -</p>
                </div>
                <button onclick="closeGenerateModal()" class="text-white hover:text-gray-200 text-2xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- 弹窗内容 -->
            <div class="p-6 flex-1 overflow-hidden flex flex-col">
                <p class="text-gray-600 text-sm mb-3">请选择要生成的文书模板，可多选后合并生成：</p>
                
                <div class="flex gap-4 flex-1" style="height: calc(90vh - 280px); min-height: 450px;">
                    <!-- 左侧：三级选择器 -->
                    <div class="w-2/3 flex gap-3">
                        <!-- 第一级 -->
                        <div class="w-1/3 border border-gray-200 rounded-lg flex flex-col">
                            <div class="bg-gray-50 px-3 py-2 border-b border-gray-200 flex-shrink-0">
                                <span class="text-xs font-medium text-gray-700"><i class="fas fa-folder mr-1"></i>分类</span>
                            </div>
                            <div id="level1List" class="flex-1 overflow-y-auto p-2">
                                <!-- 动态填充 -->
                            </div>
                        </div>
                        
                        <!-- 第二级 -->
                        <div class="w-1/3 border border-gray-200 rounded-lg flex flex-col">
                            <div class="bg-gray-50 px-3 py-2 border-b border-gray-200 flex-shrink-0">
                                <span class="text-xs font-medium text-gray-700"><i class="fas fa-folder-open mr-1"></i>子项</span>
                            </div>
                            <div id="level2List" class="flex-1 overflow-y-auto p-2">
                                <div class="text-center text-gray-400 mt-8 text-sm">请先选择分类</div>
                            </div>
                        </div>
                        
                        <!-- 第三级 -->
                        <div class="w-1/3 border border-gray-200 rounded-lg flex flex-col">
                            <div class="bg-gray-50 px-3 py-2 border-b border-gray-200 flex-shrink-0 flex justify-between items-center">
                                <span class="text-xs font-medium text-gray-700"><i class="fas fa-file mr-1"></i>文书</span>
                                <button onclick="addCurrentFile()" id="addFileBtn" disabled
                                    class="text-xs px-2 py-1 bg-green-500 text-white rounded hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed">
                                    <i class="fas fa-plus"></i> 添加
                                </button>
                            </div>
                            <div id="level3List" class="flex-1 overflow-y-auto p-2">
                                <div class="text-center text-gray-400 mt-8 text-sm">请先选择子项</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 右侧：已选文件列表 -->
                    <div class="w-1/3 border border-gray-200 rounded-lg flex flex-col bg-gray-50">
                        <div class="bg-purple-50 px-3 py-2 border-b border-gray-200 flex justify-between items-center">
                            <span class="text-xs font-medium text-purple-700">
                                <i class="fas fa-check-circle mr-1"></i>已选文件
                                <span id="selectedCount" class="ml-1 bg-purple-600 text-white text-xs px-1.5 py-0.5 rounded-full">0</span>
                            </span>
                            <button onclick="clearAllSelected()" id="clearAllBtn" disabled
                                class="text-xs text-red-500 hover:text-red-700 disabled:opacity-30">
                                <i class="fas fa-trash-alt"></i> 清空
                            </button>
                        </div>
                        <div id="selectedFilesList" class="flex-1 overflow-y-auto p-2">
                            <div class="text-center text-gray-400 mt-8 text-sm">
                                <i class="fas fa-inbox text-2xl mb-2"></i>
                                <p>暂未选择文件</p>
                                <p class="text-xs mt-1">从左侧面板添加</p>
                            </div>
                        </div>
                        <div class="p-2 border-t border-gray-200 bg-white">
                            <div class="text-xs text-gray-500">
                                <p><i class="fas fa-info-circle mr-1"></i>相同类型文件将自动合并</p>
                                <p class="mt-1 ml-4">• 多个docx → 合并为一个docx</p>
                                <p class="ml-4">• 多个xlsx → 合并为一个xlsx</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 底部统计 -->
                <div class="mt-3 p-2 bg-blue-50 rounded-lg flex justify-between items-center">
                    <div class="text-sm">
                        <span class="text-gray-600">预计生成：</span>
                        <span id="previewDocx" class="hidden mr-3">
                            <i class="fas fa-file-word text-blue-600"></i>
                            <span class="font-medium">Word文档</span>
                            <span class="text-xs text-gray-500">(<span id="docxCount">0</span>个文件合并)</span>
                        </span>
                        <span id="previewXlsx" class="hidden">
                            <i class="fas fa-file-excel text-green-600"></i>
                            <span class="font-medium">Excel表格</span>
                            <span class="text-xs text-gray-500">(<span id="xlsxCount">0</span>个文件合并)</span>
                        </span>
                        <span id="previewNone" class="text-gray-400">请选择文件</span>
                    </div>
                </div>
            </div>
            
            <!-- 弹窗底部 -->
            <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
                <button onclick="closeGenerateModal()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                    取消
                </button>
                <button id="confirmGenerateBtn" onclick="confirmGenerate()" disabled
                    class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-magic mr-2"></i>生成文书
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "/api";
        let currentPage = 1;
        let pageSize = 20;
        let totalItems = 0;
        let currentParams = {};
        let currentData = []; // 保存当前数据以便展开详情

        // 状态映射（根据实际接口返回调整）
        const statusMap = {
            0: { text: '待处理', class: 'bg-gray-100 text-gray-800' },
            1: { text: '处理中', class: 'bg-blue-100 text-blue-800' },
            2: { text: '已结案', class: 'bg-green-100 text-green-800' },
            3: { text: '已中止', class: 'bg-red-100 text-red-800' },
            4: { text: '已撤案', class: 'bg-orange-100 text-orange-800' },
            24: { text: '已结案', class: 'bg-green-100 text-green-800' },
            // 支持字符串类型的状态值
            '待处理': { text: '待处理', class: 'bg-gray-100 text-gray-800' },
            '处理中': { text: '处理中', class: 'bg-blue-100 text-blue-800' },
            '已结案': { text: '已结案', class: 'bg-green-100 text-green-800' },
            '已中止': { text: '已中止', class: 'bg-red-100 text-red-800' },
            '已撤案': { text: '已撤案', class: 'bg-orange-100 text-orange-800' },
            '已归档': { text: '已归档', class: 'bg-purple-100 text-purple-800' },
        };

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 默认加载全部数据
            queryHandleData();
        });

        // 转换案件编号格式，支持多种输入：
        // 202691 -> [2026]91
        // 2026]91 -> [2026]91
        // 明永劳人仲收[2026]91号 -> [2026]91 (提取核心部分)
        function convertCaseNo(caseNo) {
            caseNo = caseNo.trim();
            
            // 如果已经是完整格式 [2026]91，直接返回
            if (/^\[\d{4}\]\d+$/.test(caseNo)) {
                return caseNo;
            }
            
            // 如果是 2026]91 格式，补充左括号
            if (/^\d{4}\]\d+$/.test(caseNo)) {
                return '[' + caseNo;
            }
            
            // 如果是 20263 或 202691 纯数字格式（4位年份+至少1位序号）
            if (/^\d{5,}$/.test(caseNo)) {
                const year = caseNo.slice(0, 4);
                const num = caseNo.slice(4);
                return `[${year}]${num}`;
            }
            
            // 如果是完整案件编号（如 明永劳人仲收[2026]91号），提取 [2026]91 部分
            const match = caseNo.match(/\[(\d{4})\](\d+)/);
            if (match) {
                return `[${match[1]}]${match[2]}`;
            }
            
            return caseNo;
        }

        // 查询立案数据
        async function queryHandleData() {
            let caseNo = document.getElementById('caseNoInput').value.trim();
            const keyword = document.getElementById('keywordInput').value.trim();
            
            // 转换案件编号格式
            if (caseNo) {
                caseNo = convertCaseNo(caseNo);
                // 更新输入框显示转换后的格式
                document.getElementById('caseNoInput').value = caseNo;
            }
            
            currentParams = {};
            if (caseNo) currentParams.case_no = caseNo;
            if (keyword) currentParams.search = keyword;
            
            currentPage = 1;
            await fetchData();
        }

        // 获取数据
        async function fetchData() {
            showLoading();
            
            try {
                // 构建查询参数（过滤掉空值）
                const paramsObj = {
                    page: currentPage,
                    page_size: pageSize
                };
                
                // 只添加非空参数
                Object.keys(currentParams).forEach(key => {
                    const value = currentParams[key];
                    if (value !== '' && value !== undefined && value !== null) {
                        paramsObj[key] = value;
                    }
                });
                
                const params = new URLSearchParams(paramsObj);
                const requestUrl = `${API_BASE_URL}/handle/query?${params}`;
                
                // 调试日志
                console.log('请求URL:', requestUrl);
                console.log('请求参数:', paramsObj);
                console.log('当前页码 currentPage:', currentPage);
                
                const response = await fetch(requestUrl);
                
                console.log('响应状态:', response.status);
                console.log('响应头:', [...response.headers.entries()]);
                
                // 检查响应状态
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
                }
                
                // 获取响应文本
                const responseText = await response.text();
                console.log('响应文本前200字符:', responseText.substring(0, 200));
                
                // 尝试解析 JSON
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON解析失败:', parseError);
                    console.error('响应内容:', responseText);
                    throw new Error('服务器返回的数据格式不正确');
                }
                
                console.log('解析后的结果:', result);
                
                // 处理响应结构
                const innerResult = result.data || {};
                if ((result.code === 200 || result.code === 0) && 
                    (innerResult.code === 200 || innerResult.code === 0)) {
                    renderData(innerResult.data);
                } else {
                    const errorMsg = innerResult.message || result.message || `查询失败 (code: ${result.code})`;
                    showError(errorMsg);
                }
            } catch (error) {
                console.error('查询失败:', error);
                showError('查询失败: ' + error.message);
            }
        }

        // 渲染数据
        function renderData(data) {
            // API返回的数据结构: { data: [...], totalNum: number, page: [offset, limit] }
            const list = data.data || [];
            totalItems = data.totalNum || 0;
            currentData = list; // 保存数据
            
            // 调试信息
            console.log(`当前页码: ${currentPage}, 返回数据条数: ${list.length}, 总条数: ${totalItems}`);
            console.log('返回的分页信息:', data.page);
            if (list.length > 0) {
                console.log('第一条数据ID:', list[0].id, '案号:', list[0].case_no);
                console.log('最后一条数据ID:', list[list.length-1].id, '案号:', list[list.length-1].case_no);
            }
            
            // 调试：收集所有不同的状态值
            const statusSet = new Set();
            list.forEach(item => statusSet.add(item.status));
            console.log('发现的状态值:', Array.from(statusSet));
            
            if (list.length === 0) {
                showEmpty();
                return;
            }
            
            const tbody = document.getElementById('resultTableBody');
            document.getElementById('resultCount').textContent = `共 ${totalItems} 条记录`;
            
            tbody.innerHTML = list.map((item, index) => {
                const seqNo = (currentPage - 1) * pageSize + index + 1;
                let statusInfo = statusMap[item.status];
                if (!statusInfo) {
                    // 未知状态，显示原始值
                    statusInfo = { text: `未知(${item.status})`, class: 'bg-gray-100 text-gray-800' };
                }
                
                // 获取申请人信息 - 根据实际返回字段调整
                const applicantName = item.applicant || item.applicant_name || item.proposer || '-';
                
                // 获取被申请人信息
                const respondentName = item.respondent || item.respondent_name || item.defendant || '-';
                
                // 获取案由 - 兼容多种数据结构
                let caseReason = item.case_reason || item.case_type || item.reason || '-';
                // 如果案由为空，尝试从 item.cases 中获取
                if (caseReason === '-' && item.cases) {
                    if (Array.isArray(item.cases) && item.cases.length > 0) {
                        caseReason = item.cases[0].case_reason || item.cases[0].case_type || '-';
                    } else if (typeof item.cases === 'object') {
                        caseReason = item.cases.case_reason || item.cases.case_type || '-';
                    }
                }
                
                // 立案日期
                const handleDate = formatDate(item.handle_at || item.handle_date || item.create_time || item.filing_date);
                
                return `
                    <tr class="row-expandable fade-in" onclick="toggleDetail(${index})">
                        <td class="px-4 py-3 text-sm text-gray-900">${seqNo}</td>
                        <td class="px-4 py-3 text-sm font-medium text-purple-600">${escapeHtml(item.case_no || '-')}</td>
                        <td class="px-2 py-3 text-sm text-gray-700 truncate" title="${escapeHtml(applicantName)}">${escapeHtml(applicantName)}</td>
                        <td class="px-4 py-3 text-sm text-gray-700 truncate max-w-xs" title="${escapeHtml(respondentName)}">${escapeHtml(respondentName)}</td>
                        <td class="px-4 py-3 text-sm text-gray-700">${escapeHtml(caseReason)}</td>
                        <td class="px-4 py-3 text-sm text-gray-700">${handleDate}</td>
                        <td class="px-4 py-3 text-sm">
                            <span class="status-badge ${statusInfo.class}">${statusInfo.text}</span>
                        </td>
                        <td class="px-4 py-3 text-sm">
                            <div class="flex items-center gap-2">
                                <button onclick="event.stopPropagation(); viewDetail(${item.id})" 
                                    class="text-purple-600 hover:text-purple-800 font-medium" title="查看详情">
                                    <i class="fas fa-eye"></i> 查看
                                </button>
                                <button onclick="event.stopPropagation(); openGenerateModal(${item.id}, '${escapeHtml(item.case_no || '')}')" 
                                    class="text-green-600 hover:text-green-800 font-medium" title="生成文书">

        function renderDetailPanel(item) {

                    <!-- 被申请人信息 -->

        // 查看详情 - 跳转到立案详情页面
        function viewDetail(id) {
            if (id) {
                window.open(`/handle_detail?id=${id}`, '_blank');
            }
        }

        // 切换详情显示
        function toggleDetail(index) {
            const detailRow = document.getElementById(`detail-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            
            if (detailRow.classList.contains('hidden')) {
                detailRow.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                detailRow.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        // 更新分页
        function updatePagination() {
            const totalPages = Math.ceil(totalItems / pageSize);
            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(currentPage * pageSize, totalItems);
            
            document.getElementById('paginationInfo').textContent = 
                totalItems > 0 ? `显示 ${start}-${end} 条，共 ${totalItems} 条` : '暂无数据';
            
            document.getElementById('pageInfo').textContent = 
                totalPages > 0 ? `第 ${currentPage} / ${totalPages} 页` : '-';
            
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages || totalPages === 0;
        }

        // 切换页码
        function changePage(delta) {
            const totalPages = Math.ceil(totalItems / pageSize);
            const newPage = currentPage + delta;
            
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                fetchData();
                // 滚动到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // 重置查询
        function resetQuery() {
            document.getElementById('caseNoInput').value = '';
            document.getElementById('keywordInput').value = '';
            
            currentParams = {};
            currentPage = 1;
            totalItems = 0;
            
            // 重新查询
            queryHandleData();
        }

        // 显示加载状态
        function showLoading() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');
        }

        // 显示结果
        function showResult() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');
        }

        // 显示空状态
        function showEmpty() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('errorState').classList.add('hidden');
        }

        // 显示错误
        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '-';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr.split(' ')[0] || dateStr;
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            
            return `${year}-${month}-${day}`;
        }

        // 格式化日期时间
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr;
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }

        // 回车事件
        document.getElementById('caseNoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                queryHandleData();
            }
        });
        
        document.getElementById('keywordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                queryHandleData();
            }
        });

        // ==================== 生成文书弹窗相关 ====================
        
        let docTemplatesTree = []; // 文档模板树
        let selectedLevel1 = null; // 第一级选中项
        let selectedLevel2 = null; // 第二级选中项
        let selectedLevel3 = null; // 第三级选中项（当前聚焦的文件）
        let selectedFiles = [];    // 已选中的文件列表
        let currentCaseId = null;  // 当前案件ID
        let currentCaseNo = '';    // 当前案件编号
        let currentApplicants = []; // 当前案件的申请人列表

        // 打开生成弹窗
        async function openGenerateModal(caseId, caseNo) {
            currentCaseId = caseId;
            currentCaseNo = caseNo;
            
            document.getElementById('modalCaseNo').textContent = `案件编号: ${caseNo || '-'}`;
            document.getElementById('generateModal').classList.remove('hidden');
            
            // 重置选择状态
            selectedLevel1 = null;
            selectedLevel2 = null;
            selectedLevel3 = null;
            selectedFiles = [];
            currentApplicants = [];
            updateSelectedFilesList();
            updatePreview();
            
            // 加载案件详情获取申请人信息
            await loadCaseApplicants(caseId);
            
            // 加载模板树
            await loadDocTemplatesTree();
        }
        
        // 加载案件申请人信息
        async function loadCaseApplicants(caseId) {
            try {
                const response = await fetch(`${API_BASE_URL}/handle/detail?id=${caseId}`);
                const result = await response.json();
                
                if (result.code === 200 && result.data) {
                    // 处理嵌套结构
                    let data = result.data.data;
                    if (data && data.data) {
                        data = data.data;
                    }
                    
                    // 获取申请人列表
                    const applicants = data.applicant_arr || data.applicants || [];
                    currentApplicants = applicants.map(app => ({
                        id: app.id || '',
                        name: app.name || app.applicant_name || '',
                        selected: false
                    })).filter(app => app.name);
                }
            } catch (error) {
                console.error('加载申请人信息失败:', error);
                currentApplicants = [];
            }
        }

        // 关闭生成弹窗
        function closeGenerateModal() {
            document.getElementById('generateModal').classList.add('hidden');
            currentCaseId = null;
            currentCaseNo = '';
            selectedFiles = [];
        }

        // 加载文档模板树
        async function loadDocTemplatesTree() {
            try {
                const response = await fetch(`${API_BASE_URL}/doc_templates/tree`);
                const result = await response.json();
                
                if (result.code === 200 && result.data) {
                    docTemplatesTree = result.data;
                    renderLevel1();
                    
                    // 自动选择第一个一级目录（如果有数据）
                    if (docTemplatesTree.length > 0) {
                        selectLevel1(0);
                    }
                } else {
                    document.getElementById('level1List').innerHTML = 
                        `<div class="text-center text-red-400 mt-8 text-sm">加载失败: ${result.message || '未知错误'}</div>`;
                }
            } catch (error) {
                console.error('加载文档模板失败:', error);
                document.getElementById('level1List').innerHTML = 
                    `<div class="text-center text-red-400 mt-8 text-sm">加载失败: ${error.message}</div>`;
            }
        }

        // 渲染第一级（5个文件夹）
        function renderLevel1() {
            const container = document.getElementById('level1List');
            
            if (docTemplatesTree.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">暂无分类</div>';
                return;
            }
            
            container.innerHTML = docTemplatesTree.map((item, index) => `
                <div onclick="selectLevel1(${index})" 
                    class="level1-item cursor-pointer px-3 py-2 rounded-lg hover:bg-purple-50 transition mb-1 ${selectedLevel1 === index ? 'bg-purple-100 border border-purple-300' : ''}"
                    data-index="${index}">
                    <div class="flex items-center">
                        <i class="fas fa-folder ${selectedLevel1 === index ? 'text-purple-600' : 'text-yellow-500'} mr-2"></i>
                        <span class="text-sm ${selectedLevel1 === index ? 'font-medium text-purple-800' : 'text-gray-700'}">${escapeHtml(item.displayName)}</span>
                    </div>
                </div>
            `).join('');
        }

        // 选择第一级
        function selectLevel1(index) {
            selectedLevel1 = index;
            selectedLevel2 = null;
            selectedLevel3 = null;
            renderLevel1();
            renderLevel2();
            document.getElementById('level3List').innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">请先选择子项</div>';
            updateAddButton();
        }

        // 渲染第二级
        function renderLevel2() {
            const container = document.getElementById('level2List');
            
            if (selectedLevel1 === null) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">请先选择分类</div>';
                return;
            }
            
            const level1Item = docTemplatesTree[selectedLevel1];
            const children = level1Item.children || [];
            
            if (children.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">该分类下无文件</div>';
                return;
            }
            
            container.innerHTML = children.map((item, index) => {
                const isFolder = item.type === 'folder';
                const iconClass = isFolder ? 'fa-folder text-yellow-500' : 'fa-file text-blue-500';
                const isSelected = selectedLevel2 === index;
                
                return `
                <div onclick="selectLevel2(${index})" 
                    class="level2-item cursor-pointer px-3 py-2 rounded-lg hover:bg-purple-50 transition mb-1 ${isSelected ? 'bg-purple-100 border border-purple-300' : ''}"
                    data-index="${index}">
                    <div class="flex items-center">
                        <i class="fas ${iconClass} ${isSelected ? 'text-purple-600' : ''} mr-2"></i>
                        <span class="text-sm ${isSelected ? 'font-medium text-purple-800' : 'text-gray-700'}">${escapeHtml(item.displayName)}</span>
                    </div>
                </div>
            `;
            }).join('');
        }

        // 选择第二级
        function selectLevel2(index) {
            selectedLevel2 = index;
            selectedLevel3 = null;
            renderLevel2();
            
            const level1Item = docTemplatesTree[selectedLevel1];
            const level2Item = level1Item.children[selectedLevel2];
            
            // 如果是文件，直接添加到第三级显示
            if (level2Item.type === 'file') {
                selectedLevel3 = level2Item;
                // 检查是否需要选择申请人
                const needsApplicant = requiresApplicantSelection(level2Item.path, level2Item.displayName);
                const hintText = needsApplicant ? '<p class="text-xs text-orange-500 mt-1">此文件需要选择申请人</p>' : '';
                
                document.getElementById('level3List').innerHTML = `
                    <div class="text-center text-gray-400 mt-8 text-sm">
                        <i class="fas fa-check-circle text-green-500 mb-2"></i>
                        <p>已选择: ${escapeHtml(level2Item.displayName)}</p>
                        ${hintText}
                        <button onclick="addCurrentFile()" class="mt-2 px-3 py-1 bg-green-500 text-white text-xs rounded hover:bg-green-600">
                            <i class="fas fa-plus"></i> 添加到列表
                        </button>
                    </div>
                `;
                updateAddButton();
            } else {
                // 如果是文件夹，渲染第三级
                renderLevel3();
            }
        }

        // 渲染第三级
        function renderLevel3() {
            const container = document.getElementById('level3List');
            
            if (selectedLevel1 === null || selectedLevel2 === null) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">请先选择子项</div>';
                return;
            }
            
            const level1Item = docTemplatesTree[selectedLevel1];
            const level2Item = level1Item.children[selectedLevel2];
            
            if (level2Item.type !== 'folder') {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">已选择文件</div>';
                return;
            }
            
            const children = level2Item.children || [];
            
            // 过滤出文件
            const files = children.filter(item => item.type === 'file');
            
            if (files.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-8 text-sm">该文件夹下无文件</div>';
                return;
            }
            
            container.innerHTML = files.map((item, index) => {
                const isSelected = selectedLevel3 && selectedLevel3.path === item.path;
                // 检查文件是否需要选择申请人
                const needsApplicant = requiresApplicantSelection(item.path, item.displayName);
                // 对于需要选择申请人的文件，检查是否已经添加了任何申请人版本
                // 对于不需要的文件，按原逻辑检查
                let isAdded = false;
                if (needsApplicant) {
                    isAdded = selectedFiles.some(f => f.path === item.path);
                } else {
                    isAdded = selectedFiles.some(f => f.path === item.path);
                }
                const extIcon = getFileIcon(item.ext);
                
                return `
                <div onclick="selectLevel3(${index})" 
                    class="level3-item cursor-pointer px-3 py-2 rounded-lg hover:bg-purple-50 transition mb-1 ${isSelected ? 'bg-purple-100 border border-purple-300' : ''} ${isAdded ? 'opacity-50' : ''}"
                    data-index="${index}">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <i class="fas ${extIcon} ${isSelected ? 'text-purple-600' : 'text-blue-500'} mr-2"></i>
                            <span class="text-sm ${isSelected ? 'font-medium text-purple-800' : 'text-gray-700'}">${escapeHtml(item.displayName)}</span>
                            ${needsApplicant ? '<span class="ml-1 px-1 py-0.5 bg-orange-100 text-orange-600 text-xs rounded" title="需要选择申请人">需选人</span>' : ''}
                        </div>
                        ${isAdded ? '<i class="fas fa-check text-green-500 text-xs"></i>' : ''}
                    </div>
                </div>
            `;
            }).join('');
            
            updateAddButton();
        }

        // 选择第三级（文件）
        function selectLevel3(index) {
            const level1Item = docTemplatesTree[selectedLevel1];
            const level2Item = level1Item.children[selectedLevel2];
            const files = (level2Item.children || []).filter(item => item.type === 'file');
            
            selectedLevel3 = files[index];
            renderLevel3();
            updateAddButton();
        }

        // 根据扩展名获取文件图标
        function getFileIcon(ext) {
            const iconMap = {
                '.doc': 'fa-file-word',
                '.docx': 'fa-file-word',
                '.xls': 'fa-file-excel',
                '.xlsx': 'fa-file-excel',
                '.pdf': 'fa-file-pdf',
                '.txt': 'fa-file-alt'
            };
            return iconMap[ext] || 'fa-file';
        }

        // 更新添加按钮状态
        function updateAddButton() {
            const addBtn = document.getElementById('addFileBtn');
            // 检查当前选中的文件是否已添加
            const isAdded = selectedLevel3 && selectedFiles.some(f => f.path === selectedLevel3.path);
            addBtn.disabled = !selectedLevel3 || isAdded;
            addBtn.innerHTML = isAdded ? '<i class="fas fa-check"></i> 已添加' : '<i class="fas fa-plus"></i> 添加';
        }

        // 检查文件是否需要选择申请人
        function requiresApplicantSelection(filePath, fileName) {
            // 检查路径是否包含"5-撤诉文书"
            const isWithdrawalDoc = filePath.includes('5-撤诉文书');
            // 检查文件名是否是特定的两个文件之一
            // 去掉扩展名后进行比较
            const nameWithoutExt = fileName ? fileName.replace(/\.[^/.]+$/, '') : '';
            const isTargetFile = nameWithoutExt === '0申请人调查笔录' || nameWithoutExt === '0仲裁决定书';
            return isWithdrawalDoc && isTargetFile;
        }
        
        // 显示申请人选择对话框
        function showApplicantSelector(fileInfo, callback) {
            // 检查是否有可用的申请人
            if (currentApplicants.length === 0) {
                alert('未能获取到申请人信息，请检查案件数据');
                return;
            }
            
            // 创建对话框容器
            const modal = document.createElement('div');
            modal.id = 'applicantSelectorModal';
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4';
            
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl w-[500px] max-w-[95vw] max-h-[80vh] flex flex-col">
                    <div class="bg-gradient-to-r from-purple-600 to-purple-800 text-white px-6 py-4 rounded-t-xl flex justify-between items-center">
                        <div>
                            <h3 class="text-lg font-bold"><i class="fas fa-user-check mr-2"></i>选择申请人</h3>
                            <p class="text-sm opacity-90 mt-1">${fileInfo.displayName || ''}</p>
                        </div>
                        <button onclick="closeApplicantSelector()" class="text-white hover:text-gray-200 text-2xl">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="p-6 flex-1 overflow-hidden flex flex-col">
                        <p class="text-gray-600 text-sm mb-3">请选择需要生成文书的申请人（至少选择一位）：</p>
                        <div class="flex-1 overflow-y-auto border border-gray-200 rounded-lg p-2">
                            ${currentApplicants.map((app, index) => `
                                <div class="applicant-option flex items-center p-3 rounded-lg hover:bg-gray-50 cursor-pointer" onclick="toggleApplicantSelection(${index})">
                                    <input type="checkbox" id="applicant-check-${index}" class="w-4 h-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500 cursor-pointer" 
                                        onchange="updateSelectAllState()">
                                    <label for="applicant-check-${index}" class="ml-3 flex-1 cursor-pointer">
                                        <span class="font-medium text-gray-800">${app.name}</span>
                                    </label>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-3 flex items-center justify-between">
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" id="selectAllApplicants" class="w-4 h-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500" onchange="toggleSelectAllApplicants()">
                                <span class="ml-2 text-sm text-gray-700">全选</span>
                            </label>
                            <span id="selectedCountDisplay" class="text-sm text-gray-500">已选择 0 位</span>
                        </div>
                    </div>
                    <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
                        <button onclick="closeApplicantSelector()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                            取消
                        </button>
                        <button onclick="confirmApplicantSelection()" id="confirmApplicantBtn" disabled
                            class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-check mr-2"></i>确认选择
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 点击外部关闭
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeApplicantSelector();
                }
            });
            
            // 保存回调函数
            window.applicantSelectorCallback = callback;
        }
        
        // 关闭申请人选择对话框
        window.closeApplicantSelector = function() {
            const modal = document.getElementById('applicantSelectorModal');
            if (modal) {
                modal.remove();
            }
            delete window.applicantSelectorCallback;
        };
        
        // 切换申请人选择
        window.toggleApplicantSelection = function(index) {
            const checkbox = document.getElementById(`applicant-check-${index}`);
            checkbox.checked = !checkbox.checked;
            updateSelectAllState();
        };
        
        // 切换全选
        window.toggleSelectAllApplicants = function() {
            const selectAllCheckbox = document.getElementById('selectAllApplicants');
            const checkboxes = document.querySelectorAll('[id^="applicant-check-"]');
            checkboxes.forEach(cb => {
                cb.checked = selectAllCheckbox.checked;
            });
            updateSelectAllState();
        };
        
        // 更新全选状态
        window.updateSelectAllState = function() {
            const checkboxes = document.querySelectorAll('[id^="applicant-check-"]');
            const checkedBoxes = document.querySelectorAll('[id^="applicant-check-"]:checked');
            const selectAllCheckbox = document.getElementById('selectAllApplicants');
            
            if (selectAllCheckbox) {
                selectAllCheckbox.checked = checkboxes.length > 0 && checkboxes.length === checkedBoxes.length;
            }
            
            const confirmBtn = document.getElementById('confirmApplicantBtn');
            if (confirmBtn) {
                confirmBtn.disabled = checkedBoxes.length === 0;
            }
            
            const countDisplay = document.getElementById('selectedCountDisplay');
            if (countDisplay) {
                countDisplay.textContent = `已选择 ${checkedBoxes.length} 位`;
            }
        };
        
        // 确认申请人选择
        window.confirmApplicantSelection = function() {
            const checkboxes = document.querySelectorAll('[id^="applicant-check-"]:checked');
            const selectedApplicants = [];
            checkboxes.forEach(cb => {
                const index = parseInt(cb.id.replace('applicant-check-', ''));
                if (currentApplicants[index]) {
                    selectedApplicants.push(currentApplicants[index]);
                }
            });
            
            if (selectedApplicants.length > 0 && window.applicantSelectorCallback) {
                window.applicantSelectorCallback(selectedApplicants);
            }
            closeApplicantSelector();
        };
        
        // 添加当前选中的文件到列表
        function addCurrentFile() {
            if (!selectedLevel3) return;
            
            const filePath = selectedLevel3.path;
            const fileName = selectedLevel3.displayName;
            
            // 检查是否需要选择申请人
            if (requiresApplicantSelection(filePath, fileName)) {
                showApplicantSelector(selectedLevel3, function(selectedApplicants) {
                    // 多选申请人，但只生成一份文书，包含所有选中申请人的信息
                    const applicantNames = selectedApplicants.map(app => app.name);
                    const applicantIds = selectedApplicants.map(app => app.id);
                    
                    const fileWithApplicants = {
                        ...selectedLevel3,
                        displayName: `${selectedLevel3.displayName} (${applicantNames.join('、')})`,
                        applicantNames: applicantNames,  // 多个申请人姓名列表
                        applicantIds: applicantIds,      // 多个申请人ID列表
                        applicantName: applicantNames.join('、'),  // 兼容旧版本
                        uniqueId: `${selectedLevel3.path}#${applicantNames.join(',')}`
                    };
                    
                    // 检查是否已存在（同一文件路径）
                    const existingIndex = selectedFiles.findIndex(f => f.path === selectedLevel3.path);
                    if (existingIndex >= 0) {
                        // 替换已存在的
                        selectedFiles[existingIndex] = fileWithApplicants;
                    } else {
                        selectedFiles.push(fileWithApplicants);
                    }
                    
                    updateSelectedFilesList();
                    updatePreview();
                    updateAddButton();
                    renderLevel3();
                });
                return;
            }
            
            // 检查是否已存在
            if (selectedFiles.some(f => f.path === selectedLevel3.path)) {
                return;
            }
            
            // 添加到列表
            selectedFiles.push(selectedLevel3);
            updateSelectedFilesList();
            updatePreview();
            updateAddButton();
            renderLevel3(); // 刷新第三级显示
        }

        // 更新已选文件列表显示
        function updateSelectedFilesList() {
            const container = document.getElementById('selectedFilesList');
            const countEl = document.getElementById('selectedCount');
            const clearBtn = document.getElementById('clearAllBtn');
            const confirmBtn = document.getElementById('confirmGenerateBtn');
            
            countEl.textContent = selectedFiles.length;
            clearBtn.disabled = selectedFiles.length === 0;
            confirmBtn.disabled = selectedFiles.length === 0;
            
            if (selectedFiles.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-400 mt-8 text-sm">
                        <i class="fas fa-inbox text-2xl mb-2"></i>
                        <p>暂未选择文件</p>
                        <p class="text-xs mt-1">从左侧面板添加</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = selectedFiles.map((file, index) => {
                const extIcon = getFileIcon(file.ext);
                const isDocx = file.ext === '.docx';
                const isXlsx = file.ext === '.xlsx' || file.ext === '.xls';
                // 如果文件有申请人信息，显示标签
                const applicantBadge = file.applicantName ? 
                    `<span class="ml-2 px-1.5 py-0.5 bg-orange-100 text-orange-700 text-xs rounded">申请人: ${escapeHtml(file.applicantName)}</span>` : '';
                
                return `
                <div class="flex items-center justify-between p-2 mb-2 bg-white rounded border border-gray-200 hover:shadow-sm transition">
                    <div class="flex items-center min-w-0 flex-1">
                        <i class="fas ${extIcon} ${isDocx ? 'text-blue-500' : isXlsx ? 'text-green-500' : 'text-gray-500'} mr-2"></i>
                        <span class="text-sm text-gray-700 truncate" title="${escapeHtml(file.displayName)}">${escapeHtml(file.displayName)}</span>
                        ${applicantBadge}
                    </div>
                    <button onclick="removeSelectedFile(${index})" class="ml-2 text-gray-400 hover:text-red-500 transition">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                `;
            }).join('');
        }

        // 从列表中移除文件
        function removeSelectedFile(index) {
            const removedFile = selectedFiles[index];
            selectedFiles.splice(index, 1);
            updateSelectedFilesList();
            updatePreview();
            updateAddButton();
            renderLevel3();
            
            // 如果移除的是带有申请人信息的文件，检查是否还有其他同名文件
            if (removedFile && removedFile.applicantName) {
                const hasOtherSameFile = selectedFiles.some(f => f.path === removedFile.path);
                // 如果没有其他同名文件了，刷新第三级列表以移除"已添加"状态
                if (!hasOtherSameFile) {
                    renderLevel3();
                }
            }
        }

        // 清空所有已选文件
        function clearAllSelected() {
            selectedFiles = [];
            updateSelectedFilesList();
            updatePreview();
            updateAddButton();
            renderLevel3();
        }

        // 更新底部预览
        function updatePreview() {
            const docxFiles = selectedFiles.filter(f => f.ext === '.docx');
            const xlsxFiles = selectedFiles.filter(f => f.ext === '.xlsx' || f.ext === '.xls');
            
            const previewDocx = document.getElementById('previewDocx');
            const previewXlsx = document.getElementById('previewXlsx');
            const previewNone = document.getElementById('previewNone');
            
            if (docxFiles.length === 0 && xlsxFiles.length === 0) {
                previewDocx.classList.add('hidden');
                previewXlsx.classList.add('hidden');
                previewNone.classList.remove('hidden');
            } else {
                previewNone.classList.add('hidden');
                
                if (docxFiles.length > 0) {
                    previewDocx.classList.remove('hidden');
                    document.getElementById('docxCount').textContent = docxFiles.length;
                } else {
                    previewDocx.classList.add('hidden');
                }
                
                if (xlsxFiles.length > 0) {
                    previewXlsx.classList.remove('hidden');
                    document.getElementById('xlsxCount').textContent = xlsxFiles.length;
                } else {
                    previewXlsx.classList.add('hidden');
                }
            }
        }

        // 确认生成文书
        async function confirmGenerate() {
            if (selectedFiles.length === 0) {
                alert('请先选择要生成的文书模板');
                return;
            }
            
            const caseId = currentCaseId;
            if (!caseId) {
                alert('未获取到案件ID，请重新打开弹窗');
                return;
            }
            
            // 显示生成中状态
            const btn = document.getElementById('confirmGenerateBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>生成中...';
            btn.disabled = true;
            
            try {
                // 创建 AbortController 用于超时控制
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 300000); // 5分钟超时
                
                // 准备请求数据
                const requestData = {
                    template_paths: selectedFiles.map(f => f.path),
                    case_id: caseId,
                    // 添加文件与申请人的映射关系（支持多申请人）
                    file_applicant_map: selectedFiles.map(f => ({
                        path: f.path,
                        applicant_names: f.applicantNames || (f.applicantName ? [f.applicantName] : null),
                        applicant_ids: f.applicantIds || (f.applicantId ? [f.applicantId] : null)
                    }))
                };
                console.log('生成文档请求:', requestData);
                
                // 调用批量生成API
                const response = await fetch(`${API_BASE_URL}/doc_templates/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || `生成失败: ${response.status}`);
                }
                
                // 获取文件名
                const disposition = response.headers.get('content-disposition');
                let filename = '生成的文书.zip';
                if (disposition) {
                    // 优先处理 RFC 5987 编码格式: filename*=UTF-8''encoded_filename
                    const filenameStarMatch = disposition.match(/filename\*=UTF-8''([^;]+)/i);
                    if (filenameStarMatch) {
                        try {
                            filename = decodeURIComponent(filenameStarMatch[1]);
                        } catch (e) {
                            filename = filenameStarMatch[1];
                        }
                    } else {
                        // 处理普通格式: filename="xxx" 或 filename=xxx
                        const match = disposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
                        if (match) filename = match[1].replace(/['"]/g, '');
                    }
                }
                
                // 下载文件
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
                
                // 关闭弹窗
                closeGenerateModal();
                
            } catch (error) {
                console.error('生成文档失败:', error);
                if (error.name === 'AbortError') {
                    alert('生成文档超时，请减少选择的文件数量或稍后重试');
                } else {
                    alert('生成文档失败: ' + error.message);
                }
            } finally {
                // 恢复按钮状态
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // 点击弹窗外部关闭
        document.getElementById('generateModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeGenerateModal();
            }
        });
    </script>
</body>
